front:
  text: 河汾諸老詩集卷之三
  hash: sha256:64e1c304f28025926119cfddae2c19f4f96638d1c069cdcf9fd8f9a2736927be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_003-1a}
body:
  text: 横汾隱者房祺編陳先生賡子颺逰龍祠黄河如絲導崑崙萬里南下突禹門枝流潛行大地㡳派作八道如霆奔吾聞川真嶽靈有㝠宰况乃利澤開洪源神龍窟宅瞰平野千古廟㒵何雄尊深林含蓄雷雨潤冷殿似帶波濤㾗我来南州走塵坌執熱未濯憂思煩試㪺甘冽洗肝肺一勺注腹清且燉悠然晞風坐東廡倐見繪畫如飛騫仙官華𥚑乗朱軒旗纛掩藹蛟伏轅雷公電母踏煙霧天吳海若驅鼉黿何時借取霹靂手倒挽銀漢清乾坤廟前老翁顧我語孺子未易排天閽胡為髙論乃如此一笑滿面春風温是時三月逰人繁男女雜還簫皷喧騫菱沉玉荅靈貺割牲釃酒傳巫言巫言恍惚廟扉闔拜手上馬山煙昏峴山秋晚太山髙嵯峨小山嶁清江錦樹帶秋煙煙際人家在林藪荆河迤南三峴山此圖定繪㐮陽否詩人翰墨丹青手落筆天機隨所有峴首真在㐮陽西遥觀漢水含風猗上有龜龍一片石云是羊公墮淚碑試披禹跡考地志畫師寜免詩人疑且看滿眼江山好休作燕人過晉悲子猷訪戴圖两晉崇玄虚風流変華夏舉世尚清談天地指一馬依阿竹林賢鴻名重天下王郎衣冠胄亦復慕草野偶来剡溪上溪水正清瀉扁舟信㳂洄氣韻可瀟灑誰與好賢心丹素入圖寫山隂懐古意欲攬不盈把賦詩心夷猶六義愧騷雅西風塵冥冥倘有知音者鐡柱杖閩王鐡杖如楖栗得自荒虚鬼神域鞭笞蜑蠻今㡬年霧翳雲蒸老蛟黒腹中有篁如細泉牙節宛轉聲鏗然天生神物不虚棄提携萬里歸坡仙坡仙騎鯨凌紫煙海山一去今千年人間俯仰成今古紛紛長物何湏數洛陽銅駝卧荆棘昭陵石馬埋煙雨百斛鼎兩錢錐小大用舎俱兒嬉啇顔鶴髮一笻竹何似凌煙功臣玉具髙榰頥黄閣得君真耐乆扶持四海經綸手㑹湏柱到崑崙顛九點青煙看九有鐡邪杖邪吾不知誠將道眼窺天機一朝雷雨轟空陂湏防化作蛟龍飛武善夫桃源圖武郎種桃滿雲溪三月紅雨行人迷自從玉勒入雲馭春風杜宇年年啼飛黄騰踏有天倪紫電轉盻天山低要将白璧沽娥眉更把黄金鑄梟蹄羲和挾輈六龍馳暮景恐迫虞渊西新詩擬唤槐安夢咫尺溪邊春色動飛花漠漠水泠泠蒼苔荒了煙霞洞聞道西風觧涴人何處江山可問津征塵障断仙源路且看丹青萬樹春送李長源月下孤鴻枕上鷄髙城今日又分携九秋雲氣崤陵底萬里河聲砥柱西飲罷関山秋寂寂詩成風雨暮凄凄千金善保并州噐要放崑崙入馬蹄寄陕郡楊正卿西奄臨川上看飛鴻十載西州一轉蓬親老家貧初有累才踈意廣卒無功姦雄頗忌孔文舉冨貴何如張長公滿地塵埃浮世狭一㠶思駕五湖風又遷客形容國士心春風鶴髮不勝簪鍾儀去楚衣冠異王粲依劉歳月深歳晚艱危無短䇿酒酣悲壮動長呤遥憐蘭省楊夫子一𥿄書来抵萬金宣宗挽詞洛邑周𥘉定蒼梧舜不還九天来鶴馭萬國泣龍顔儉徳髙千古鴻勲際两間無由望弓劔雲氣鬰橋山寒食祀墳廻登臨晉西原廢寺前朝廢寺枕山河尚有摩雲窣堵坡故國巳非唐日月老僧猶指晉山河年来筋力登臨倦乱後心情感慨多石蘚荒碑碎文字他年更得㡬摩挲當年雲搆倚天開一夕煙塵化刼灰佛閤丹青餘瓦礫禪房花木亦蒿菜春風萬里騷人怨落日千秋杜宇哀断礎荒煙無限意一章詩律為誰裁送㓂輔臣古陌風塵點客衣送春亦伴春歸東風不管離人恨吹落楊花滿地飛蒲中八詠為師嵓卿賦蒲津晚度雲濤注壷口水府蟠九壘公子莫争舟蛟龍方骳虞坂暁行伯樂沉九原泥塗困騏驥千古長坂空無人知此意舜殿薫風嵓廊鳴五絃薫兮南風来鳳去徽音絶眢井生莓苔首陽晴雪天風吹瓊瑶白冐首陽頂欲和采薇歌千山凍雲冷東林夜雨林壑冷含秋風雨黯如海何如賛公房青燈淡相對西嵓疉巘梵刹盤空曲烟霞錦繡紋山靈倘招隱徑入萬重雲媯汭夕陽蓂階降英皇此地嬪有虞南廵竟不返愁雲接蒼梧王官飛湍縣流落雲嵓遥空挂飛練何時㪺清冷一頮黄塵面河汾諸老詩集卷之三
