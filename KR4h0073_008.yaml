front:
  text: 河汾諸老詩集卷之八
  hash: sha256:07ad80b0dd99f6f39d0e7cddff081b70d7164eeabd2f0c54fb885d8cf480b0a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_008-1a}
body:
  text: 橫汾隱者房祺編兊齊曹先生之謙益甫送梁仲文聖人既巳沒聖道遂不傳異端壅正途榛塞踰千年大儒起相承闢之斯廓然濂溪回北流伊洛開洪源學者有適從披雲見青天我生雖多難聞道早有緣中歲苦病目不得深窮研梁君河東秀意氣凌孤騫探道得奧閫辨說如何懸所知非為而亦舀焉出口耳者彼我奚足言却來自秦京過我汾水邊未幾復言别長途北之燕行看奮六翮髙舉凌雲煙功成名遂後歸老河之湍相從講聖學與子長周旋感寓一首中林有幽蘭蘿生雜衆草地僻人不知芬芳空自好嚴霜凋古木歲晚難獨保願充君子佩探擷尚未早安得清風來吹香出林表髙林夾金井修竹連清池梧葉既薿薿竹實亦纍纍可栖復可食鳯鳥來何時重華不得見韶樂何䏻為日暮空嘆息蕭瑟寒風吹變白頭呤梧桐不獨老鴛鴦亦雙死靜女懷真心循夫正如此奈何及末流不知再醮羞中路多反目幾人䏻白頭君不見㑹稽愚婦䡖負薪不肯終身事買臣一朝歸佩太守印悔望車塵那敢近人生賦命自不齊貧賤富貴各有時隨雞逐狗聽所適世事悠悠爭得知間中作雄雞啼一聲驚起五更睡出門何擾擾競逐名與利冥冥車馬塵白日暗城市蕭條蓬蒿居獨有犧皇地髙情杳秋雲靜性凝止水俯仰天地間淡然無一事東坡赤壁圖先生矯矯人中龍京塵千丈不可容五年一夢落江海翩然野鶴開囚籠雪堂閉門讀書史興來飄然弄雲水黃泥坂下醉三更赤壁磯頭航一􅓗明月清風共一江邁往之氣無由降酒酣作賦記清賞䄂有巨筆如長杠一朝騎鯨尋李白人間俯仰成今昔續絃無處覔鸞膠見畫思公空嘆息風雪障面圖頑雲暗空雪正飛老木殭折溪流澌弊裘羸馬奈寒子便面障風何所之僕夫徒行亦良苦吻噤不語心應語人生受陳分豈無但願不作君家奴秋日雜詩山中有佳人考盤歌在澗別來今幾時歲月忽巳晏相思不得書矯首望飛鴈寄元遺山詩到䕫州老更工只今人仰少陵翁自憐奕世通家舊不得論文一笑同草緑平原愁落日鴈飛寒水怨秋風黃金礦裏相思淚幾墮憑髙北望中秋日懷李仁卿獨倚斜陽百尺樓故人千里思悠悠陶唐祠下煙光晚姑射峰前鴈影秋尊酒幾時同李白雲山多處是并州臨風惆悵無人㑹一曲啇歌寫暮愁麻信之為夀中州人物一元龍卓犖英才磈磊胸濁酒數杯遺世慮清詩千首傲侯封諸郎照眼三株樹舊業關心五老峰頭白他年賦歸去綵衣扶杖看從容送王仲通從事西逰五見春翩翩書記日爭新懷鄉不作登樓賦佐府真為入幕賔世事匆驚翻手雨馬蹄又踏化衣塵古來燕趙多豪傑定有飛書薦鶚人上巳日感懷舊遊桃李涴丘塵十六年悲客裏春浮白可䏻澆磈磊踏青聊且慰酸辛蘭亭修褉人何在庾信傷心賦又新芳草喚愁花濺淚東風回首一霑巾白菊數枝的皪照秋清何物為花乃寧馨玉骨冰肌誇皎潔風璫月珮想娉婷霜迎葉上迷青女露下籬邊泣素靈見說寒英能愈疾擬開三徑著茅亭紅葉枝上萎黃慘未乾嚴霜一夕總成丹色烘曉日燕脂暖影濯秋江蜀錦寒南鴈數聲催晼晚西風幾度見凋殘橫山樓下梨千樹每憶童年九日看北宫光泰門邊避暑宫翠華南去幾年中干戈浩蕩人情變池島荒蕪樹影空魚藻有基埋宿草廣寒無殿貯涼風登臨欲問前朝事紅日西沉碧水東趙吉甫種德園培植功夫與日新風光別是一家春三秋槐茂堂堪􅌟九畹蘭芳佩可紉桃李隂成應有地棟梁材出豈無人從今不羡燕山竇五桂聮芳老一椿寄鄉中故人十年夢繞故山薇世事悠悠與願違華表未成遼鶴語青冥空羡塞鴻歸雲橫北嶺迷鄉眼塵滿西風涴客衣為報吾州舊親識短夀相慰莫令稀送侯君美歸雲中暫時相見又相違留滯天涯更易悲客淚清和秋雨落鄉心杳逐朔雲飛路經險阻行須穩書報平安寄莫遲邂逅故人如問我為言貧病未䏻歸自趙城還府簡子城邊過盡春却尋歸路竝清汾落花亂逐溶溶水逺樹低連漠漠雲姑射雨晴山似染洞羊風暖草如薰獨憐疲俗誅求困愁嘆聲多不可聞讀唐詩鼓吹傑句雄篇萃若林細看一一盡精深才髙不似人間語吟苦定勞天外心白璧連城無少玷朱絃三嘆有遺音不經詩老遺山手誰解披沙㨂得金吊王內翰從之性年髙步到瀛州豈料東陵是故侯庾信竟歸周室老劉禎真有岱宗逰山瞻斗仰名空在桂折蘭摧恨未休鬱鬱佳城滹水上野煙寒草木經秋上韓應州天挺英雄入彀中堂堂自有古人風乘機力􅐌興龍業唾手能收汗馬功四海威名方共仰一時才武更誰同潁川不是留黃霸行拜中書作相公懷劉京叔奕世金蘭契於今只有君英才殊落落餘子謾紛紛一別幾春草相思空暮雲何時展良覿把酒共論文宿雲臺觀趍程疲永路記宿喜琳宫蓮嶽三峯對松林一徑通地偏俗塵空入夜清詩夢山泉落枕中中條阻雨行李淹蒲坂歸期念晉州髙風千葉下寒雨一山秋澗響頻驚夢蟲聲亂入愁酒醒孤館裏心折大刀頭初秋雨後積雨蕩煩暑回風吹早凉老苔翻舊碧病葉墮新黃久客應吾道浮生半異鄉黑貂渾弊盡愁看一開箱九日幽懶慢令節廢招尋無復歡娛地空驚閉門黃菊晚步屧紫苔深尚友陶彭澤悠然鴈北塞迎霜雪西風送雨翰數行天淡淡萬里路漫漫日落秋聲急江空暮影寒古人書斷絶矯首望雲端幽居有感間居仍地僻門閉草萊深車馬無還往詩書有討尋嚴霜催歲晚破屋覺寒侵計拙煩親舊誰䏻數賜金秋風亭故基危亭冠雉堞飛􅌟何崔嵬一夕隨劫火變化成煙灰頽基翳蓬蒿壞道封莓苔蕭條古城上空有秋風來除夜三十七年過勞生强半休此心空耿耿吾道每悠悠感物百憂集思親雙淚流春風添一歲又是五更頭送李郭二子還鄉喪亂身為客淹流淚滿衣亦知生處樂未卜有年歸祖帳臨寒水仙舟漾夕暉春來一相送腸斷故山薇中書耶律公挽詞虎嘯龍興際乘時自有人風雲暗慘淡天地入經綸忽報台星坼仍傳薤露新斯民感無極灑淚呌蒼旻應州廟學釋奠夜色齊厨肅秋風殿宇清右文遭聖代備禮引諸生牢醴嚴三獻豆邊陳兩楹祭餘同飲福旭日樹頭明送李端卿東行故人有所適驅馬出東城紅樹添秋色青山滿去程曽為同省掾偏愴逺離情别後䏻相憶因風為守聲子猷訪戴圖興盡空回雪夜舟訪人虛語亦悠悠須知汾水多竒士豈獨王家一子猷梅影隔窗渾似李夫人江月多情為返魂宛是依依舊顔色向人憔悴立黃昏秋夜寂寂江城夜向間西風吹鴈呌雲端一聲逺過南樓去月滿碧天秋水寒臨潼溫泉琢玉為池浴太真芙蓉花暖水生春誰知寂寞千秋後留與行人洗路塵長安早發行李匆匆滻水頭雨餘凉氣動新秋五更馬上還家夢先逐西風到晉州秋夜聞笛雲净寒空月滿樓何人橫玉叶清秋梁州罷伊州起不盡關山此夜愁廢宫斷磚殘礎碎盤花輦路荒凉蔓草遮玉殿朱樓俱不見壞墻嶾嶙繞人家過茹越嶺有感山川良是昔人非北望松楸淚滿衣三十餘年底底事全家南度一身歸
