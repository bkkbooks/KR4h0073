body:
  text: 河汾諸老詩集者乃大同路儒學教授房先生之所編也豫一日得之惜乎諸老一代髙名百年清氣巳嘗遍白于天下是集未嘗流布也皇慶癸丑夏特命工鋟木以廣其傳然而諸老之學又豈專乎詩也出處大略巳具前序今書是説以告夫後之學者不為無益云六月吉日尊賢堂髙昻霄共白
  hash: sha256:a873291e64f2070a0271d009dc54ab8bd2f474c34be550de7f10b04a524707ee
