body:
  text: 河汾諸老詩集者迺大同路儒學教授房先生之所編也予一日得之惜乎諸老一代髙名百年清氣巳嘗遍白于天下是集未嘗流布也皇慶癸丑夏特命工鋟木以廣其傳然而諸老之學又豈專乎詩也出處大略巳具前序今書是說以告夫後之學者不爲無益云六月吉日尊賢堂髙昻霄共白
  hash: sha256:d1b618635692627d1b357eb090a10f0d72595bf9e727cc5828717a9028f424ee
