front:
  text: 河汾諸老詩集後序近代詩人遺山元先生為之冠先生太原人太原境與平陽接河山勝槩地土所冝習俗所尚古今人物不殊至如師友淵源文章正脉略與之等故河汾間諸老與天下人材無譲麻貽溪與元老詩學無慊古文出其右公言也張石泉房白雲與元老㳺從南者子颺子京二陳昆仲與元老或詩或文數相贈遺者遯菴菊軒有稷亭二叚之目與元老相次登第者曹兊齋與元老同為省掾日以文詩講議者或曰兊齋雲中應人也吾子列河汾之間得無附㑹歟不然兊齋之先誠應人自客汴梁北渡居平陽者三十餘年發明道學為文楷式指授後進桃李光輝盈溢其門或教授郷里或䆠逹四方有二子叔舉季行文筆亦盛傳而况狀元王公趙城人曹之外父也兊齋生而隱徳光輝汾晉沒而丘壠在焉豈非吾郷先生歟夫諸老之詩有深而冲澹如陶柳者有豪放如李翰林劉賔客者有䡖俗近雅如元白者有對屬切當如許渾者有騷雅奥義古風大章浸入于杜草堂之域者徃年吾友楊君仲徳議成此集不幸早世仲徳有云不觀遺山之詩無以知河汾之學不觀河汾之詩無以知遺山之大不觀遺山河汾之作不知唐人諸作者之妙不觀唐人之作不知三百篇六義之深意予今纂録自貽溪至兊齋凡八人得古律詩二百一首號曰河汾諸老詩集皡皡郝先生序文於前其不肖繼言于後才識淺陋不能盡其藴吾郷學者如林有能慕河汾之派觀知所興起云大徳辛丑歳二月望日横汾隱者房祺序
