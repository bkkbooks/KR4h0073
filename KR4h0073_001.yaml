front:
  text: 河汾諸老詩集卷之一
  hash: sha256:e0c14e445deb61f8b7540e924546095de912c95839ff8a8139ee0cf46512792e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_001-1a}
body:
  text: 横汾隠者房祺編貽溪麻先生革信之上雲内帥賈君北極長虹掣西垣太白髙千年知運圯四海共兵鏖霧黒龍蛇閗山昏虎豹噑石傷填海羽波動負山鰲遺介潽寒渚驚鼯走夜牢江山留慘黯天地入焄蒿衆折思枝柱𥘉寒俟蠒繰明良逢慶㑹郷曲得名豪梁棟因人出艅艎為世操安流欣皷枻奔浪獨能篙日出戈揮景江翻弩射濤風聲連澒洞裁鑒悉纎毫桃李勤封植茅菅日薙蓐獵埸㳺麂􅎷魚渚動鰌魛井邑生春色禾麻飫土膏民歌烏遶屋士喜馬騰槽朔塞閑刁斗天山擁節旄岱嵩何落落江漢自㴞㴞大寳珠仍璧長城雉與壕崇牙分棨㦸大壤屬鞬櫜日月依龍徳風雲挾豹韜夾山群戰騎黒水泳䡖舠落日觀魚浦秋風射雉臯化行家置塾役簡里停鼛歌奏投壷室文閑治獄曹西庵談性理東閣㑹竒髦森爽開璜琥縦横列鴈羔禮容新泮宇物性遂莊濠牧唱聞朝起樵音聽暮號孤嬰收坎阱流滯起蓬蒿屡下陳蕃榻誰空北海醪郤軍敦禮樂曹館冨風騷客望龍門聚雛從鳳穴翶世知三窟隘人可二天迯雨露承㤙命山河襲世勞功名髙衞霍輔弼慕伊咎鞍馬憐髀肉簮纓視鬢毛雅申張仲徳頌入魯侯昭有客傷淪落無堦冩鬰陶太行雲羃羃代北雨騷騷去國心將折懐人首獨搔身如伏櫪驥情似失林猱涸轍将安往窮途况所遭幸今逢石直欲啖醨糟忖巳誠無有登門亦巳叨沐薫良備至感激欲號咷巳客馮驩舍猶傷范叔𫀆鳴湏開匣劔割欲試鈆刀𣏌梓容山木包羞薦沼芼毎思休困頓佳䕃有蘭䔌送杜仲梁東㳺仲梁先稱善夫野馬何决驟飛雲何悠颺啇嵓不足稽此士又欲東略宋與梁青山不知老白日乃許忙菊潭之水清泠淵野人飲之得長年芳醲不買夀淡泊差可乆北山峩峩蒼翠巔丹崖石老生𬗋煙靈芝秋𣏌老霜骨黄精茯苓飽新􅓯望君嶄嶄病以癯酌之食之可以還膚腴况有劉荆州元丹丘子寜舎之汗漫逰凉秋佳月酒一杯送子東下心徘徊半山亭前一茅屋歳寒霜勁君當來短歌行送秦人薛微之赴中書河流宿層氷山有太古雪翩翩有客来老面黒於鉄盤盤胸臆間猶挂太華月不肯下貴勢便欲呌雙闕朔寒衣裳單路逺馬䠥􅍷昔人丈夫事肝膽不可越我歌送君行歌聲何激烈悲風為我起酒行歌半闋望君青雲端何恤逺離別關中行送李顕卿關中行我持一盃酒送君西入秦秦川欝相望渭水流沄沄黄河中折倐復来太華倚天青壁開我送君兮渺何許春風不肯吹君迴舉酒酹五陵浩歌登髙䑓終南之山何崔嵬長安舊㳺安在哉百年繁華成劫灰千古英雄沉草萊風塵洞豺狼墓天地茫茫入煙霧我載歌送君去太華終南冝有深絶䖏嵓扄人跡所不到石壁蒼苔老煙雨堂挂女蘿充腹多薯蕷玉井蓮開十丈花茯苓根結千年樹白雪青松良可老􅎷門有龐啇有皓不然凌雲學䡖舉呼取安期羡門語憶昨與君友相逢日日酬杯酒酒䦨起舞肝膽開小桃唱罷歌楊桞晉語狎秦癯秦談驚晉叟秦晉之交那可無胡爲不作雙飛鳬碧草離離生早春哀歌望㫁西南雲求君于終南之上不可得大華峰頭㑹見君阻雪華下愛山乆成癖得山真雋永太華隔風塵五年夢幽境傳聞十丈蓮擬扣玉仙井雪花忽迷漫蒼巔墮昏暝蹇予世縁深方外乆自屏意是希夷君俗駕踈造請行行風撼林稍稍雲度嶺雲間三峰面隠約露芒頴初如灔澦堆屹起勢奔猛漸如倚天劔萬仭䥫花冷煙霞半明㓕瞬息變光景乃知造物心相哀亦相警歸鞭晚怱怱回首心耿耿浩歌夜深寒孤月挂峰頂置酒半山亭得秋字懐抱乆不寫兀坐如縶囚永懐西山勝浩蕩成兹遊嵓壑互窈窕叢蘿欝深幽飛煙入虚無長風跨崑丘楚甸散林莽啇顔亦綢繆雷雨天地空景氣入夜浮况當節律变萬物颯以秋雲来白日慘天澹清江流西望渺関河沉沉生暮愁蘭苕暗幽谷芰荷老芳洲一笑舉酒觴浩歌聊自酬幽賞興未極慨歎心悠悠世事蒼茫外寒沙明白鷗歸潽堂為劉京叔賦逃淵魚深處避弋鴻冥飛古来賢逹士亦復歌采薇南山先廬在兵塵悵暌違山空無人居惟見草木肥翩然千歳鶴一朝復来歸新築臨渾水行逕窈以㣲清流鳴前除白雲入晨扉迴顧陵谷遷萬事倐巳非著書入理奥得句窮天機前路政自迫此道儻可㡬殷勤抱中璧黽勉留餘輝第恐遯世志還負習隠譏永懐泉上石一觴與君揮惜無陵風翰遐舉非所希守約齋爲吕仲和作讀書不務愽造道當入㣲一理貫萬理一岐㑹衆𡵨譬彼庖丁力騞然解牛時節間即有得肯綮寜復疑道喪向千載聖逺孰可期養勇敵所愾養氣動以隨心非安如山遇变鮮不移吾門有聖學觀心乃其師宴坐一室中自得實在兹胡為滯紛感紬繹如蠒絲人生矧多𣣔事物日以滋牛羊踐徑蹊虎豹攻藩籬我甞叩天理誠明不容欺第恐逹者事還爲狷者嗤楊将軍坰馬圖古人相馬不相肉畫工畫馬亦畫骨淡淡生絹一片雲眼中群龍何突兀飛莵汗血天驥種筆墨之間見飛動前趍後逐互有態渉嚙行留分向背豐草長林性本真駉駉駜駜相與馴開元天子盛監牧四十萬匹錦繡屯人言息馬戰所重風鬛霜蹄惜無用君不見幽燕飛鞚時中原流血成淵池秪令征討苦未休金鞍䥫甲彌山丘安得故歸如此馬飲水求芻恣閑暇題李氏寓酒軒吾聞李謫仙一斗詩百篇酒家眠又聞陽諌議月廩盡以送酒錢伯倫酒徳頌無功醉郷仙說到飲中理兹世何渺然古来賢逹士以酒全其天所以陶靖節浩歌歸園田獨余醉翁之意不在酒樂在山水静所便古人巳矣不可作今人紛紛亦䏻賢北里冨煄天髙楼歌舞筵千金結客多少年哀吹豪竹倒傾玉舡以酒玄爲市地勢相嬋嫣焉知貧士貧到骨健倒仰天歌黄鵠黄鵠歌罷無翼飛妻啼兒號書一束借問主人翁心跡誰與同我亦頗解飲聖賢時一中酒酣擊尊破兩耳生春風安得園綺遇携我入山去清泉爲醸碧溪深醉卧溪頭弄雲月盧山兵後得房希白書知弟謙消息聞道王師阻渭津盧山以後䧟兵塵軍行萬里速如鬼風慘一川愁殺人亂後僅知家弟在書来疑與故人親夢中亦覺長安逺回首関河淚滿巾晚歩張鞏田間地入荒蕪過客稀村深門巷暮山圍悠悠獨鳥穿雲下䇿䇿寒烏掠日飛人事百年梧葉老秋風萬里稲花肥兵塵河朔迷歸路惆悵平沙送夕暉板橋道中篁竹瀟瀟野水濵光風過眼與時新隂崖積雪猶含凍逺樹浮煙巳帶春世故未應悲古道歳華聊得伴閑身蕨芽筍稚行當好莫擬山中問主人過陜萬古津茅據上㳺崤凾西去接秦頭悲風皷角重城暮落日関河百戰秋形勝古来須上䇿塵埃歳晚只覊愁豺狼滿地荆榛合日㫁中條是故丘爲王徳新夀百年人物惜凋零尚喜衣冠見老成數口虀塩憂桂玉一川風雨獨柴荆紅顔未羡方春好黄髮應從此夜生異日華林講殊禮不妨鳩杖從公行爲秦人梁師夀功名萬里駕龍荒不作當年陛楯郎顔角乆瞻天上日鬢毛未點鏡中霜衣沾暑雨千秋潤扇引薫風六月凉見說長年出冲静海山求藥本㣲茫送申生取新赴中書寒山漠漠日初曛過盡瀟瀟鴈鶩群百代髙歌餘白雪一朝飛歩上青雲倚門䯈髒誰怜我滿腹精神獨見君看取扶搖便鵬翼臨𡵨且莫嘆離分寄杜仲梁塞上愁多雲易隂故人雖在鴈無音交情念子黄金重世故稽人白髮深芳草春風千里夢青燈夜雨两郷心岱宗入眼東南秀悵望雲山淚滿襟寄元裕之朔雲隂雪晚重重日入寒蕪塞草空沂水東囘無去翼天山南断有哀鴻三年逺别交情外一夜相思客夢中明日関河對雙淚秪将幽憤寄秋風竹林院仝張之純賦桞色侵尋映短籬竹稍零亂挂殘暉山禽自識忘機客飛下庭柯更不飛稍稍林間布糓聲村南村北水雲平偶来竹寺看山坐閑聽清溪遶舎鳴中書大丞相耶律公挽詞甲辰五月十四日砥柱中流折藏舟半夜移世賢髙允相人嘆叔孫儀未拜荆州面嘗蒙國士知無階陪引紼萬里輀又文獻群公表東舟八葉傳珪璋貽嗣徳蘭藻靄遺編禁籍虚青瑣仲㳺定玉泉太常千字誄誰有筆如椽蜜國公挽詞鬰鬰佳城閉翩翩銘旐開風悲信陵墓雨入孝王臺萬古傷渠壊千年望鶴来平明國門外蕭皷不勝哀又漢制隆㤙禮周列屏翰人知尊帝胄我但識儒冠傷蘭桂孤髙歎鳳鸞從今門下客長鋏向誰彈王子夀郷友生朝自接夫君席頻逢歳律更面嚴知氣直語出見生平講學詩書義論交里社情湏髯如㦸在長對玉峰明送李端卿之鄴臺僮馬戒晨装新霜未葉黄嗟予無壮節送子慘離膓林慮荒秋色清漳下夕陽遥知一尊酒吊古爲喬子夀講道顔淵巷新齋友與同守身為大節寡𣣔是全功教子勤書裏娱親飬疾中黄花佳節近歳歳看秋風贈劉伯威劉子山中秀相逢氣自同箕裘門戸計菽水古人風折節豈為辱苦心應有終平生湖海志未用哭途窮贈王明遼海遺珠玉黄秀木空百年書法裏萬事酒盃中耿耿此心在悠悠吾道窮好賢明逹事獨喜與君仝秋夜感懐老境歡娱少愁懐感歎長世途多險阻歸興渺滄茫踈雨梧桐夜西風蟋蟀床平明攬青鏡衰鬢又添霜趙太監䧏日自從龍戦野特立孰如公著跡雲鵬上收功汗馬中髙談天下計餘事古人風勿藥行逢喜春風兩紅雲中夜憔悴杜陵客悲王仲宣四圍晴立璧一突午無煙病卧秋風裏愁吟夜雨過明朝誰褁飯萬一使君憐渡洛泉石經行乆林丘弭望間溪鳴風蕩水谷暗雨含山淡淡䡖鷗沒飛飛倦鳥還世縁良日苦空羡野雲閑浩浩浩浩春風裏悠悠倦客情天寒花寂寞氷泮水縱横念逺心将折聞兵夢亦驚江山憔悴乆倚杖嘆餘生河汾諸老詩集卷之一
