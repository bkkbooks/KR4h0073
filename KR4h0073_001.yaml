front:
  text: 河汾諸老詩集卷之一
  hash: sha256:e0c14e445deb61f8b7540e924546095de912c95839ff8a8139ee0cf46512792e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_001-1a}
body:
  text: 橫汾隱者房祺編貽溪麻先生革信之上雲內帥賈君北極長虹掣西垣太白髙千年知運圯四海共兵鏖霧黑龍蛇閗山昏虎豹嗥石傷填海羽波動負山鰲遺介潽寒渚驚鼯走夜牢江山留慘黯天地入焄蒿衆折思枝柱𥘉寒俟繭繅明良逢慶會鄉曲得名豪梁棟因人出艅艎為世操安流欣鼓枻奔浪獨能篙日出戈揮景江翻弩射濤風聲連澒洞裁鑒悉纎毫桃李勤封植茅菅日剃蓐獵埸遊麂􅎷魚渚動鰌魛井邑生春色禾麻飫土膏民歌烏繞屋士喜馬騰槽朔塞間刁斗天山擁節旄岱嵩何落落江漢自滔滔大寶珠仍璧長城雉與壕崇牙分棨戟大壤屬鞬櫜日月依龍德風雲挾豹韜夾山群戰騎黑水泳輕舠落日觀魚浦秋風射雉臯化行家置孰役簡里停鼛歌奏投壷室文間治獄曹西庵談性理東閣會竒髦森爽開璜琥縱橫列鴈羔禮容新泮宇物性遂莊濠牧唱聞朝起樵音聽暮號孤嬰收坎阱流滯起蓬蒿屢下陳蕃榻誰空北海醪郤軍敦禮樂曹館冨風騷客望龍門聚雛從鳳穴翶世知三窟隘人可二天逃雨露承恩命山河襲世勞功名髙衛霍輔弼慕伊咎鞍馬憐髀肉簮纓視鬢毛雅申張仲德頌入魯侯昭有客傷淪落無階寫鬱陶太行雲羃羃代北雨騷騷去國心將折懷人首獨搔身如伏櫪驥情似失林猱涸轍將安往窮途况所遭幸今逢石直欲啖醨糟忖巳誠無有登門亦巳叨沐薰良備至感激欲號咷巳客馮歡舍猶傷范叔𫀆鳴須開匣劔割欲試鉛刀𣏌梓容山木包羞薦沼芼每思休困頓佳蔭有蘭䔌送杜仲梁東遊仲梁先稱善夫野馬何決驟飛雲何悠揚啇嵓不足稽此士又欲東略宋與梁青山不知老白日乃許忙菊潭之水清泠淵野人飲之得長年芳醲不買夀淡泊差可久北山峩峩蒼翠巔丹崖石老生𬗋煙靈芝秋𣏌老霜骨黃精茯苓飽新􅓯望君嶄嶄病以癯酌之食之可以還膚腴况有劉荆州元丹丘子寧舍之汗漫逰涼秋佳月酒一杯送子東下心徘徊半山亭前一茅屋歲寒霜徑君當來短歌行送秦人薛微之赴中書河流宿層氷山有太古雪翩翩有客來老面黑於鐵盤盤胸臆間猶挂太華月不肯下貴勢便欲呌雙闕朔寒衣裳單路逺馬蹩􅍷昔人丈夫事肝膽不可越我歌送君行歌聲何激烈悲風為我起酒行歌半闋望君青雲端何恤逺離別關中行送李顯卿關中行我持一杯酒送君西入秦秦川鬱相望渭水流沄沄黃河中折倐復來太華倚天青壁開我送君兮渺何許春風不肯吹君回舉酒酹五陵浩歌登髙臺終南之山何崔嵬長安舊遊安在哉百年繁華成劫灰千古英雄沉草萊風塵洞豺狼墓天地茫茫入煙霧我載歌送君去太華終南冝有深絶處嵓扄人迹所不到石壁蒼苔老煙雨堂挂女蘿充腹多薯蕷玉井蓮開十丈花茯苓根結千年樹白雪青松良可老􅎷門有龐啇有皓不然凌雲學輕舉呼取安期羡門語憶昨與君友相逢日日酬杯酒酒闌起舞肝膽開小桃唱罷歌楊桞晉語狎秦癯秦談驚晉叟秦晉之交那可無胡為不作雙飛鳬碧草離離生早春哀歌望斷西南雲求君于終南之上不可得大華峰頭會見君阻雪華下愛山久成癖得山真雋永太華隔風塵五年夢幽境傳聞十丈蓮擬扣玉仙井雪花忽迷漫蒼巔墮昏暝蹇豫世緣深方外久自屏意是希夷君俗駕踈造請行行風撼林稍稍雲度嶺雲間三峰面隱約露芒頴初如灔澦堆屹起勢奔猛漸如倚天劔萬仭鐵花冷煙霞半明滅瞬息變光景乃知造物心相哀亦相警歸鞭晚匆匆回首心耿耿浩歌夜深寒孤月挂峰頂置酒半山亭得秋字懷抱久不寫兀坐如縶囚永懷西山勝浩蕩成兹遊嵓壑互窈窕叢蘿鬱深幽飛煙入虛無長風跨崑丘楚甸散林莽啇顔亦綢繆雷雨天地空景氣入夜浮况當節律變萬物颯以秋雲來白日慘天淡清江流西望渺關河沉沉生暮愁蘭苕暗幽谷芰荷老芳洲一笑舉酒觴浩歌聊自酬幽賞興未極慨歎心悠悠世事蒼茫外寒沙明白鷗歸潽堂為劉京叔賦逃淵魚深處避弋鴻冥飛古來賢逹士亦復歌采薇南山先廬在兵塵悵暌違山空無人居惟見草木肥翩然千歲鶴一朝復來歸新築臨渾水行徑窈以微清流鳴前除白雲入晨扉回顧陵谷遷萬事倐巳非著書入理奧得句窮天機前路政自迫此道儻可幾殷勤抱中璧黽勉留餘輝第恐遁世志還負習隱譏永懷泉上石一觴與君揮惜無陵風翰遐舉非所希守約齋為吕仲和作讀書不務博造道當入微一理貫萬理一岐會衆𡵨譬彼庖丁力騞然解牛時節間即有得肯綮寧復疑道喪向千載聖逺孰可期養勇敵所愾養氣動以隨心非安如山遇變鮮不移吾門有聖學觀心乃其師宴坐一室中自得實在兹胡為滯紛感紬繹如繭絲人生矧多𣣔事物日以滋牛羊踐徑蹊虎豹攻藩籬我嘗叩天理誠明不容欺第恐逹者事還為狷者嗤楊將軍坰馬圖古人相馬不相肉畫工畫馬亦畫骨淡淡生絹一片雲眼中群龍何突兀飛莵汗血天驥種筆墨之間見飛動前趍後逐互有態涉嚙行留分向背豐草長林性本真駉駉駜駜相與馴開元天子盛監牧四十萬匹錦繡屯人言息馬戰所重風鬛霜蹄惜無用君不見幽燕飛鞚時中原流血成淵池秪令征討苦未休金鞍鐵甲彌山丘安得故歸如此馬飲水求芻恣間暇題李氏寓酒軒吾聞李謫仙一斗詩百篇酒家眠又聞陽諌議月廩盡以送酒錢伯倫酒德頌無功醉鄉仙説到飲中理兹世何渺然古來賢逹士以酒全其天所以陶靖節浩歌歸園田獨余醉翁之意不在酒樂在山水靜所便古人巳矣不可作今人紛紛亦能賢北里冨煄天髙樓歌舞筵千金結客多少年哀吹豪竹倒傾玉船以酒玄為市地勢相嬋嫣焉知貧士貧到骨健倒仰天歌黃鵠黃鵠歌罷無翼飛妻啼兒號書一束借問主人翁心迹誰與同我亦頗解飲聖賢時一中酒酣擊尊破兩耳生春風安得園綺遇携我入山去清泉為釀碧溪深醉卧溪頭弄雲月盧山兵後得房希白書知弟謙消息聞道王師阻渭津盧山以後陷兵塵軍行萬里速如鬼風慘一川愁殺人亂後僅知家弟在書來疑與故人親夢中亦覺長安逺回首關河淚滿巾晚步張鞏田間地入荒蕪過客稀村深門巷暮山圍悠悠獨鳥穿雲下䇿䇿寒烏掠日飛人事百年梧葉老秋風萬里稻花肥兵塵河朔迷歸路惆悵平沙送夕暉板橋道中篁竹瀟瀟野水濵光風過眼與時新隂崖積雪猶含凍逺樹浮煙巳帶春世故未應悲古道歲華聊得伴間身蕨芽筍稚行當好莫擬山中問主人過陜萬古津茅據上遊崤函西去接秦頭悲風鼓角重城暮落日關河百戰秋形勝古來須上䇿塵埃歲晚只羈愁豺狼滿地荆榛合日斷中條是故丘為王德新夀百年人物惜凋零尚喜衣冠見老成數口虀鹽憂桂玉一川風雨獨柴荆紅顔未羡方春好黃髮應從此夜生異日華林講殊禮不妨鳩杖從公行為秦人梁師夀功名萬里駕龍荒不作當年陛楯郎顔角久瞻天上日鬢毛未點鏡中霜衣沾暑雨千秋潤扇引薰風六月涼見説長年出沖靜海山求藥本微茫送申生取新赴中書寒山漠漠日初曛過盡瀟瀟鴈鶩群百代髙歌餘白雪一朝飛步上青雲倚門䯈髒誰憐我滿腹精神獨見君看取扶搖便鵬翼臨𡵨且莫嘆離分寄杜仲梁塞上愁多雲易隂故人雖在鴈無音交情念子黃金重世故稽人白髮深芳草春風千里夢青燈夜雨兩鄉心岱宗入眼東南秀悵望雲山淚滿襟寄元裕之朔雲隂雪晚重重日入寒蕪塞草空沂水東回無去翼天山南斷有哀鴻三年逺别交情外一夜相思客夢中明日關河對雙淚秪將幽憤寄秋風竹林院同張之純賦桞色侵尋映短籬竹稍零亂挂殘暉山禽自識忘機客飛下庭柯更不飛稍稍林間布穀聲村南村北水雲平偶來竹寺看山坐間聽清溪繞舍鳴中書大丞相耶律公挽詞甲辰五月十四日砥柱中流折藏舟半夜移世賢髙允相人嘆叔孫儀未拜荆州面嘗蒙國士知無階陪引紼萬里輀又文獻群公表東舟八葉傳圭璋貽嗣德蘭藻靄遺編禁籍虛青瑣仲遊定玉泉太常千字誄誰有筆如椽蜜國公挽詞鬱鬱佳城閉翩翩銘旐開風悲信陵墓雨入孝王臺萬古傷渠壞千年望鶴來平明國門外蕭鼓不勝哀又漢制隆恩禮周列屏翰人知尊帝胄我但識儒冠傷蘭桂孤髙歎鳳鸞從今門下客長鋏向誰彈王子夀鄉友生朝自接夫君席頻逢歲律更面嚴知氣直語出見生平講學詩書義論交里社情須髯如戟在長對玉峰明送李端卿之鄴臺僮馬戒晨裝新霜未葉黃嗟豫無壯節送子慘離腸林慮荒秋色清漳下夕陽遙知一尊酒吊古為喬子夀講道顔淵巷新齋友與同守身為大節寡𣣔是全功教子勤書裏娛親飬疾中黃花佳節近歲歲看秋風贈劉伯威劉子山中秀相逢氣自同箕裘門戶計菽水古人風折節豈為辱苦心應有終平生湖海志未用哭途窮贈王明遼海遺珠玉黃秀木空百年書法裏萬事酒杯中耿耿此心在悠悠吾道窮好賢明逹事獨喜與君同秋夜感懷老境歡娛少愁懷感歎長世途多險阻歸興渺滄茫踈雨梧桐夜西風蟋蟀床平明攬青鏡衰鬢又添霜趙太監降日自從龍戰野特立孰如公著迹雲鵬上收功汗馬中髙談天下計餘事古人風勿藥行逢喜春風兩紅雲中夜憔悴杜陵客悲王仲宣四圍晴立璧一突午無煙病卧秋風裏愁吟夜雨過明朝誰褁飯萬一使君憐渡洛泉石經行久林丘弭望間溪鳴風蕩水谷暗雨含山淡淡輕鷗沒飛飛倦鳥還世緣良日苦空羡野雲間浩浩浩浩春風裏悠悠倦客情天寒花寂寞氷泮水縱橫念逺心將折聞兵夢亦驚江山憔悴久倚杖嘆餘生河汾諸老詩集卷之一
