front:
  text: 河汾諸老詩集校語卷一二葉前十行九字匠原空格三葉後八行七字澒原作後八行十一字暮原作墓後十行十四字草原空格六葉後六行十一字放原作故十葉前七行七字丹原作舟前八行九字神原作仲後二行七字梁原作渠後五行七字封原空格後六行四五字零落原空格十一葉前五行四五六字鄴城傍原均空格前六行四字春原空格後五行七字華原空格後五行九字未原作木十二葉前五行五字頰原空格前七行七字涼原空格前八行十三字邊原作過卷二一葉前五行十字鳥原作烏前八行六字鳥原作烏二葉前一行一字偃原空格後十行二字休原空格後十行六字有原空格三葉前一行二三字廉平原作庶乎前一行六字似原空格後七行四字紙原作絶
  hash: sha256:17c1aedb2ac6452d91a15e450fb27262cb6508d355be28635aff3c886e9d5d29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_010-1a}
body:
  text: 卷三一葉後六行十字霆原作二葉前六行八字遝原作還前十行八九字低培原空格五葉後四行十字君原空格卷四一葉後七行二字淅原空格後七行五字趁原空格後十行十五十六字間來原空格二葉前一行十六字中原空格前二行九字堂原空格前五行十三十四字類貫原空格前六行二字室原作空前十行一字袖原空格前十行十五字皇原空格後一行十五字在原空格三葉前十行二字溪原空格前十行十五字子原空格四葉後一行十三字昭原作照卷五四葉前二行十六字纆原作纏六葉後一行一字哭原作器七葉前十行一字靑原空格前十行四五字要錢原空格八葉前八行三字求原作未九葉前二行六字鬥原作聞卷六一葉後一行七字泜原作汦後五行十四字阿原作河後九行五字乍原作年後十行十一字罥原作骨二葉前八行十六字肝原作府卷七二葉前十行一二字賢乎原空格前十行十六十七字謨至原空格後一行一字誠原空格後一行十六字冬原作人三葉前九行一字旦原作且後十行六七字泠泠原作冷冷卷八一葉前十行九字苟原作為前十行十字知原空格前十行十三字允原空格前十行十四字蹈原作舀前十行十七字入原空格後九行二字梧原作林二葉前二行四字吟原作呤前三行十六字徇原作循後八行五字葦原作􅓗三葉前五行十二字凍原作陳前八行七字原作盤五葉後八行十七字書原作壽六葉後六行一字往原作性七葉後一行六至十字殘暑失境靜原均空格後序二葉前八行十六字甚原作其前八行十七字備原空格前九行十六十七字雖然原空格前十行十五至十七字是集者原空格後十行十五字具原作共河汾諸老集影寫元尊賢堂本卷三卷四皆與前卷銜接不另葉尚存刻書舊式汲古閣粵雅堂兩本雖皆從此出而款式已非近刻元人選元詩本行款悉同而元本脫誤處已據別本校改不如影寫本之尚存廬山真面書貴舊刻良有以也今依影寫本影印別為校語如右壬戌八月留菴居士
