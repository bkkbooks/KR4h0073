canonical_identifier: bkk:krp/KR4h0073/WYG/v1/juan/6
seq: 6
front:
  text: 先生克已復之
  hash: sha256:9193c2379aaa3be828e1bd70732eb95275c943f8bc570b0890d73d53f24ca548
body:
  text: 乙已清明遊青陽峽東山氣象太猛悍萬馬駸駸來楚甸中分不肯割鴻溝鍛礪戈矛期一戰西山折北如西漢獨餘絳灌奔而殿誰為劉項决雌雄頼有韓彭力相援盧溝直下兩水合泯泯暗流通一線突為瀑布出山口流沫成輪浪成旋前途百步落石甕黛蓄亭渟那敢眄沉沉南去若白虹為嶼為泜互隱見鑿開混沌㡬千秋世俗雖見如不見今人誰有筆如椽為寫佳名傳㝢縣人間佳節重清明呼兒折簡招諸彦一生能著㡬兩屐佳處每欲經行徧山靈著意勸遊人吞吐煙霞生萬變山阿玉女跪焚香嵓畔仙人一笑倩坐者儼若帝王尊劒佩雍容侍閒宴植者磊落如鉅人聚立廣廷議封禪拱者矯矯如勇夫執戈戺花著綦弁平灘淺瀨乍可掲溪路曲隨峰勢轉葛屨偏宜苔蘚滑行襟時被薔薇罥當面煙嵐翠舞蛟出岫閒雲飄素練羣行不復事拘檢眼正明時脚還倦班荆共坐溪上石粔籹濁醪具時饌良辰無奈夕陽催羽觴正要清歌薦醒心况復有寒泉玉池遄返成三嚥三分春色二分休風外飛花時一片古人行樂欲及時半百之前猶掣電惟有愛山縁未斷夢寐孱顔添健羨一窮到骨不自治虚負胷中書萬巻謾向山中老却人生來不識荆州面肝肺槎牙倩酒澆顧我非狂亦非狷紛紛世上無真是弃置從渠若秋扇歸來新月偃林梢寂寞衡門掩深院題興公靜樂庵我愛興上人閒處先著脚雖有買山錢難尋一丘壑向來棲息地龍象久寂寞重尋林下徑竹石若紛薄溪水恣交流嵓花自開落却埽丈室中一缾還一鉢靜樂題其顔塵縁聊解縛寥寥千歲下此理誰發樂我今為拈出不免一重錯有淨必有垢無苦亦無樂混沌元不死七竅剛自鑿珍重菴中人萬法本無著獨有太古心油然滿寥廓冬夜自適四壁摧頽手重泥一枝隨意足成棲歸來已化千年鶴老去慵聽半夜雞世事榮枯都是幻物情長短不須齊寸心耿耿何人㑹隱几寒牕片月低中秋二首萬籟聲沉暮靄收長河瀉浪洗清秋遙天千里淡如水明月一輪光滿樓隨意傾銀謀勝賞誰家横玉調新愁可憐白首蟾宫客羞對嫦娥説舊遊又夜凉河漢靜無聲澄澈天開萬里晴蟾吐寒光呈皎潔桂排疎影極分明良宵方喜故人共醉語那知隣舍驚一片詩魂收不得九霄直與月俱清雲中暮雨在禹門古壘雲藏一徑微河山依舊昔人非貪徵往古興亡事不覺城頭雨濕衣憶梅姑射仙人冰雪膚昔年伴我向西湖别來㡬度春風換標格而今似舊無與隱之㑹午芹精舍酒間雨作麥田日日起黄埃官長憂民意不開底是山靈相嫵媚故驅風雨過江來楸花楸樹馨香見未曾牆西碧蓋聳孤稜㑹須雨洗塵埃盡看吐高花一萬層河汾諸老詩集巻六欽定四庫全書河汾諸老詩集巻七元房祺編
