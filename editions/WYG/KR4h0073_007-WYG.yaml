seq: 7
front:
  text: 菊軒段先生成已誠之
  hash: sha256:fe144bdc4f40c1050b9cdf9a37a45410417f35f87f2dc0a5ec0e70854f7e5287
body:
  text: 題容安堂陳子少英邁逸氣不可挫典刑肖乃翁出語輒驚座行止非所能造物聽掀簸功名鷹在鞲歲月蟻旋磨區區一室中十載供史課結廬慕淵明志向有許大淡墨寫形似終日相對坐一室足我容百念付慵惰青山隱簷楹流水出階左植花數十叢種竹千百箇事來若機張事去如缾墮浩然方寸間不受一塵汚豈無二仲賢閒暇日相過有酒相獻酬有詩互賡和溪山入笑談珠玉霏咳唾徜徉天地間一物莫非我醉來語更真卿去我將卧主人正高眠山鳥莫啼破題梁氏靜樂堂攘攘區中人役心名與利於身竟何有乾沒不少置叔敬有耳孫犖犖與時異一官不肯覔閒居養高志築室塵境中中有塵外意方其厭囂啾歸來行少塈牀頭一巻書靜洗紛華累茍能樂其樂寧復事吾事見客不吝情有酒即成醉為問東華塵何如北牕睡清風吹我懷萬事覺無味誰知方寸間自有清凉地蘇氏承顔堂登仙不羨飛雙鳬宰官不樂紆金珠行年四十著綵服悲啼效作兒聲呱丈夫豈無四方志倚閭望望心何如家國無事夀觴舉慈顔得酒增和舒客來草具對客食殺雞奉母其賢乎榮華富貴固所願有子能盡如君謨至誠不動古未有悦親自得神明扶茁哉冬生孟林笋圉焉日出姜泉魚古來孝感有如此今人蓋以古為模嘗聞古有色難戒愛深容色何愉愉詩成不覺涕涙俱爾有母遺傷獨無他年誰作孝友傳請録吾語為君書題秋暮山行圖亂山嵂崒爭清妍寒林寂厯相綿聯人間黄塵千萬丈一㸃不到山林邊秋光淡薄秋氣爽浮雲積翠何䓤芊高風凄其脱木葉向來面目仍增娟江流一曲抱山麓孤舟斜日棲江湍行人何適來負擔腰膂􅀈犖确石頭路蹇驢鞭不前人家前塗渺何許望之不及憂悁悁問公何從得此本筆勢髣髴營丘傳我本山中人見之心惘然嶔㟢厯落真可笑對畫題詩思昔年送孫仲文行臺之召仲也何人斯不滿六尺長言議間英發入耳音琅琅胷懷湛秋水面目嚴清霜讀書及城旦寓跡鳬鷺行自公少餘暇婉媮奉高堂甘㫖未及親有飯不敢嘗顔色或未怡綵衣戲親傍執喪三年中哀慕如新喪囘思顧復勞此意何時忘日聞辟書下且喜還且傷捧檄念吾親不覺涕泗滂拔英外臺選列布皆珪璋掾吏須㡬人亦必求循良世人豈無才要以德自將糾擿誰弗能吾心恐無常詩人有明誡茹柔吐其剛孝為百行先子孝吾既詳茍能推此心前路未易量慇懃養雲翼行矣勿怱忙醒心亭牕前流水玉泠泠牕下高人酒半醒喚省邯鄲枕中夢如看王湛案頭經翛然自得天遊趣恍若那知地境靈説似功名場上客倦遊時節一來聽送尋正道江邊楊柳纔堪折陌上行人還又别春光不解苦留人兩岸楊花飛白雪江風搖搖吹緑波欲别未别傷如何願君少住聽我歌後日重來白髮多跋三堂王自寫真解衣盤礴真畫史不待濡毛知可矣葛巾草服常畫我意欲置我山嵓裏虎頭于今㡬百年與渠誰後復誰先翛然蜕跡乘風去一笑相逢喜拍肩跋秦得真墨晴牕不用辨犀紋墨妙秦郎已飫聞翠餅瑩如雅背淨玉圖香鄙麝臍薰永寧賜弟今猶少易水無良古亦云老我媿非揮翰手兩丸投贈負伊勤送馮資深西歸人間蠻觸日干戈暮四朝三能㡬何歸去不憂缾粟罄西山雨足蕨薇多蕭蕭華髮老書生久欲歸田計未成喜聽日邊消息好故山容得子真耕三年思慮謾營營重見浮山眼倍青胷次無塵元自好牀頭况有洗心經候門稚子喜歸來煖熱那無酒一杯抖擻滿身塵土盡襟懷還對好山開嗅梅玉骨那愁瘴霧傷好將經巻伴南荒坡仙鼻孔清如水老覺朝雲道氣長題張郎中明皇小决圖志在馳驅禍已胎笑顔况更為誰開貪爭飛鞠鞭􅐒去不覺踰垣有鹿來天寳承平事久無弄丸驢背恣馳驅不期一笑宫中戲傳作人間小决圖如夢菴覺時還笑夢時訛夢覺其間有㡬何聊爾藏身大槐國卧看明月上南柯虞坂曉行林外晨雞第一聲隴頭殘月伴人行未知局促鹽車下老驥蕭蕭又㡬鳴首陽晴雪薇歌一曲對青山萬古千秋老翠巒望斷空嵓人不見光搖銀海玉峰寒書師嵓卿蒲中八詠圖後老大溪山入夢頻聊憑圖畫寫情真歸歟不及身强健山有英靈恐笑人河汾諸老詩集巻七欽定四庫全書河汾諸老詩集巻八元房祺編兑
