seq: 5
front:
  text: 白雲子房先生皥希白
  hash: sha256:b2814b9ed6549d7bad1b245307c5e31752606914c317970d6eebc8b2481e5501
body:
  text: 江上行浮雲澹澹心悠悠杖藜來作江邊遊商人打鼔催行舟洪波不斷東南流木葉蕭蕭荆楚秋勸君休上王粲樓日落滄江增暮愁賣劒行贈韋漢臣滄海波未澄無人斬長鯨韋郎三尺玉匣中鳴不平蛟龍一出雷雨隨翕忽變化清四夷可惜有才不見用青天白日將何為酒酣起舞抱劒哭肅肅悲風動茅屋不如南山學種田自古青萍換黄犢扣角歌贈史吉甫剥剥剥扣牛角自從破却黄雞殻陰陽二氣分清濁巽則為風震則雷流者成川峙者嶽易道常行日用間醉夢昏昏人不覺伏羲不得已而畫文王不得已而重叔世不及上世隆夫子不言人益䝉著成大傳開盲聾譬如日出滄海東無物不在光明中峨􅖭山人史居士來到公安大智寺手攜牛角欲何為發明三聖心中事人言康節是前身但不家居洛之涘胷中一部皇極書造化功夫際天地舒之則彌滿六合巻之則不盈一握近之則在乎目前逺之則入乎㝠邈有人來問先天學扣牛角剥剥剥貧家女貧家女德性溫柔寡言語終年辛苦不下機身上却無絲一縷倡家女兒百不㑹只向人前賣嬌態繡茵端坐青樓中銀燭熒煌照珠翠書言福善與禍淫未必天公有此心盜跖長年顔子夭古來顛倒非獨今高處是崑崙低處是東溟崑崙推不倒東海填不平物之不齊物之情貧女莫羨倡女榮不義富貴浮雲輕持身但如冰雪清德耀荆釵有令名送王升卿傷哉船子峰頭月昨夜團團今夜缺月華猶自不長圓人生安得無離别世上憂端千萬許惟有别離心最苦盧川春晚送君行落花為我啼紅雨四海紛紛尚戎馬我曹只合歸林下如椽大筆今無用日課新詩自陶寫嵩陽佳處如罨畫溪可漁兮田可稼我欲從君覔隱居却恐山靈嫌俗駕題吕仙亭岳陽城南吕公洞道人見客無迎送事少方知日月長身閒未覺功名重竹影松陰生午凉山色湖光設朝供高吟下視世間人㡬人不在黄粱夢寄呈岳陽諸友禀性太褊率不受塵事觸自小逺市㕓僻居在嵓谷人間嗜好心舍書百不欲一飽更奚求簞瓢隨分足失脚墮世路纒糾若徽纆人以官為榮我以官為辱平生喜高潔為官近卑俗平生喜曠達為官窘邊幅平生喜疎散為官貴圓熟平生喜忠鯁為官多諂曲澆漓當此時古道那可復鷦鷯巢一木偃䑕飲滿腹誰能朱門中區區匄粱肉折腰趨下風不厭解印速青山喚我歸早晚謝羈束一尊石上酒浩歌對松菊題張信之見山堂自古朝市人罕與山相㑹山豈欲逺人人自與山背張侯創新居正在闤闠内何以得青山坐上日相對胷中有丘壑眼前無障礙人物既蕭散山不問内外晚來天氣佳收目入清快乾坤無一塵草木有多態千里好風來㡬縷殘霞在拄笏當此時未覺功名大慶王鼎玉生子魏侯照乘珠卞氏連城玉此物豈易得君家貯滿屋平生積德深天錫以多福熊羆入夢頻不待封人祝長者已雄偉㓜者更清淑指日看騫騰誰為犀角秃願君剩買書學語便教讀斯文久不振六經要再續人生宇宙間百歲一瞬速美惡暫時休何者為榮辱且引昔寧馨遶院種松菊陶潛歸去來有子萬事足戊子萬事人間已飽諳一身猶自客天南行非楊秉三無惑性似􅄞康七不堪俗學為名多外飾聖人養德貴中函有時靜坐深思省三十年前總是慙寄段誠之咫尺春風三十三不如歸卧舊煙嵐浮雲富貴吾何慕陋巷簞瓢分所甘多語數窮深可戒虚名無用不宜貪寥寥孔學今千載頼有斯人可共談次前韻寄王升卿谷口人家十二三家家牕户得晴嵐千章雲木秀而野一脈泉流清且甘狥俗到頭終是病躭書自古不名貪作詩為問東溪友樽酒何時愜笑談辛卯生朝呈郭周卿段復之甕面醯雞積有年近來霧豁見全天出言最忌談人惡入德尤宜去自賢囘也屢空趨聖域參乎一唯得心傳佛岐老徑雖高絶不及中庸道坦然贈趙山甫冦盜連年劇蝟毛一身無處可奔逃陳平自合西歸漢葛亮焉能北事曹嗟我命兼才共薄仰君名與德俱高㡬時一笑滄浪畔右手持盃左手螯哭楊叔能仰看飛鴻俯看鱗訃來不覺淚沾巾風塵末路尤多難山澤癯儒只合貧亂後有誰收恨骨眼前無復見斯人襄陽舊隱依然在花落空庭冷淡春和李正甫九日韻論著哀時總可哀不如且放笑顔開留連風月憑詩句管領江山有酒盃我欲處身如此處君言裁恨若為裁從今但有錢三百相約高樓盡醉迴憶新牆劉德淵雲烟杳靄水微茫何處青山是岳陽白髮滿頭空自老黄塵兩脚為誰忙同盟鄂渚言猶在偕隱廬峰興未忘近有倦遊詩數首西風吹不到新牆思隱得箇黄牛學種田蓋間茅屋傍林泉情知老去無多日且向閒中過㡬年詘道詘身俱是辱愛詩愛酒總名仙世間百物還須買不信青山也要錢寄王文炳愛客孔文舉能詩陸士衡十年求識面千里飽聞名郁郁芝蘭秀蕭蕭風露清㡬時樽酒畔容我話平生和楊叔能之字韻遭亂重相見寛心不用悲江山佳麗地人物太平時白蟻千家酒黄花九日詩鹿門不可隱吾道欲安之丙申元日三十八年過星星白髪多干戈猶浩蕩蹤跡轉蹉跎世事堪長歎吾生付短歌江湖從此逝烟雨一漁蓑辛丑巴東元日舊日逢春喜而今怕見春紅塵長路客殘病老夫身政拙難書考家貧只累人自憐頭上髮更比去年新秋夜百計求安未得安此心須在鬢凋殘漫漫長夜渾無睡蟋蟀堂深秋雨寒自遣㡬見秋風㡬見春一愁未已一愁新閒中㸃檢平生事惟有清貧不負人又甕面浮香處處春任他時事百端新自知野鹿山麋相不是麒麟閣上人别西湖聞説西湖可樂飢十年勞我夢中思湖邊欲買三間屋問遍人家不要詩題張濟之勝覽軒誰言山色可忘憂誰道澄江銷客愁試倚闌干西北望浮雲依舊暗神州讀杜詩後學為詩務鬬竒詩家竒病最難醫欲知子美高人處只把尋常話做詩又穹礴㝠搜枉費功天然一語自然工况兼詩是窮人物好句多生感慨中又千里奔馳蜀道難艸堂賓主罄交歡怒冠三挂簾鈎上誰謂將軍禮數寛春日觀菜手種蕪菁欲療饑春來頗怪發生遲東風貪長新桃李未有功夫到菜畦河汾諸老詩集巻五欽定四庫全書河汾諸老詩集巻六元房祺編遯菴段
