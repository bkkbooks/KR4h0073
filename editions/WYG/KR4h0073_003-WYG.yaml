front:
  text: 陳先生賡子颺
  hash: sha256:04a94e03a118de0edb99a32b9530b69bf396d11bf21f0d0d87800f8d8be93ae7
body:
  text: 遊龍祠黄河如絲導崑崙萬里南下突禹門枝流潛行大地底派作八道如霆奔吾聞川真嶽靈有㝠宰况乃利澤開洪源神龍窟宅瞰平野千古廟貌何雄尊深林含蓄雷雨潤冷殿似帶波濤痕我來南州走塵坌執熱未濯憂思煩試㪺甘洌洗肝肺一勺注腹清且燉悠然晞風坐東廡倐見繪畫如飛鶱仙官華裾乘朱軒旗纛掩藹蛟伏轅雷公電母踏煙霧天呉海若驅鼉黿何時借取霹靂手倒挽銀漢清乾坤廟前老翁顧我語孺子未易排天閽胡為高論乃如此一笑滿面春風溫是時三月遊人繁男女雜遝簫鼔喧搴菱沉玉答靈貺割牲釃酒傳巫言巫言恍惚廟扉闔拜手上馬山烟昏峴山秋晚圖太山高嵯峨小山低㟝嶁清江錦樹帶秋烟烟際人家在林藪荆河迤南三峴山此圖定繪襄陽否詩人翰墨丹青手落筆天機隨所有峴首真在襄陽西遙觀漢水含風猗上有龜龍一片石云是羊公墮涙碑試披禹跡考地志畫師寧免詩人疑且看滿眼江山好休作燕人過晉悲子猷訪戴圖兩晉崇𤣥虚風流變華夏舉世尚清談天地指一馬依阿竹林賢鴻名重天下王郎衣冠胄亦復慕草野偶來剡溪上溪水正清瀉扁舟信㳂洄氣韻可瀟灑誰與好賢心丹素入圖寫山陰懷古意欲攬不盈把賦詩心夷猶六義媿騷雅西風塵㝠㝠倘有知音者鐵拄杖閩王鐵杖如楖栗得自荒虚鬼神域鞭笞蜑蠻今㡬年霧翳雲蒸老蛟黑腹中有篁如細泉牙節宛轉聲鏗然天生神物不虚棄提攜萬里歸坡仙坡仙騎鯨凌紫烟海山一去今千年人間俯仰成今古紛紛長物何須數洛陽銅駞卧荆棘昭陵石馬埋煙雨百斛鼎兩錢錐小大用舍俱兒嬉商顔鶴髮一笻竹何似凌烟功臣玉具高榰頥黄閣得君真耐久扶持四海經綸手㑹須拄到崑崙巔九㸃青烟看九有鐵邪杖邪吾不知誠將道眼窺天機一朝雷雨轟空陂須防化作蛟龍飛武善夫桃源圖武郎種桃滿雲溪三月紅雨行人迷自從玉勒入雲馭春風杜宇年年啼飛黄騰達有天倪紫電轉盼天山低要將白璧沽蛾睂更把黄金鑄褭蹄羲和挾輈六龍馳暮景恐廹虞淵西新詩擬喚槐安夢咫尺溪邊春色動飛花漠漠水泠泠蒼苔荒了煙霞洞聞道西風解涴人何處江山可問津征塵障斷仙源路且看丹青萬樹春送李長源月下孤鴻枕上雞高城今日又分攜九秋雲氣崤陵底萬里河聲砥柱西飲罷關山秋寂寂詩成風雨暮凄凄千金善保并州器要放崑崙入馬蹄寄陜郡楊正卿西菴臨川堂上看飛鴻十載西州一轉蓬親老家貧初有累才疎意廣卒無功姦雄頗忌孔文舉富貴何如張長公滿地塵埃浮世狹一帆思駕五湖風又遷客形容國士心春風鶴髮不勝簪鍾儀去楚衣冠異王粲依劉歲月深歲晚艱危無短䇿酒酣悲壯動長吟遙憐蘭省楊夫子一紙書來抵萬金宣宗挽詞洛邑周初定蒼梧舜不還九天來鶴馭萬國泣龍顔儉德高千古鴻勲際兩間無由望弓劒雲氣鬱橋山寒食祀墳迴登臨晉西原廢寺前朝廢寺枕山河尚有摩雲窣堵波故國已非唐日月老僧猶指晉山河年來筋力登臨倦亂後心情感慨多石蘚荒碑碎文字他年更得㡬摩挲又當年雲搆倚天開一夕烟塵化刼灰佛閣丹青餘瓦礫禪房花木亦蒿萊春風萬里騷人怨落日千秋杜宇哀斷礎荒煙無限意一章詩律為誰裁送寇輔臣古陌風塵㸃客衣送春君亦伴春歸東風不管離人恨吹落楊花滿地飛蒲中八詠為師嵓卿賦蒲津晚渡雲濤注壺口水府蟠九壘公子莫爭舟蛟龍方骫骳虞坂曉行伯樂沉九原泥塗困騏驥千古長坂空無人知此意舜殿薰風巖廊鳴五絃薰兮南風來鳯去徽音絶眢井生莓苔首陽晴雪天風吹瓊瑤白冒首陽頂欲和采薇歌千山凍雲冷東林夜雨林壑冷含秋風雨黯如海何如贊公房青燈淡相對西嵓疊巘梵刹盤空曲烟霞錦繡紋山靈倘招隱徑入萬重雲媯汭夕陽蓂階降英皇此地嬪有虞南廵竟不返愁雲接蒼梧王屋飛湍縣流落雲嵓遙空挂飛練何時㪺清泠一頮黄塵面河汾諸老詩集巻三欽定四庫全書河汾諸老詩集巻四元房祺編陳先生庾
