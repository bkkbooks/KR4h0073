seq: 2
front:
  text: 石泉張先生宇彦升
  hash: sha256:d1e4c67a6c97fa0bf0244aa5c5733fd8992c0093fe536bf14a95331e89b5c80b
body:
  text: 送趙宜之歸新安兼簡洛下諸友悽惻復悽惻送君汾水側人生歡㑹少一别難再得昔經刧火然二鳥奮驚翼嗷嗷各何之同落天西北日夕相和鳴此樂未易極狂風忽吹散一鳥歸故國翺翺入寥廓萬里期一息鄧林有餘陰未肯栖枳棘玉山有嘉禾未肯求粒食一鳥獨未歸毰毸老無力矯首思舊羣澘然涙沾臆雌雞行雌雞粥粥將鳬兒鳬兒入水雞鳴悲岸南岸北飛且隨但恐搏攫遭鳶鴟岸傍無食寧饑死朝暮不肯須臾離傍人爭笑愚且癡我哀物理為人欺雲溪秋泛圖為閻國寳賦晴嵐滴翠霜樹殷石錦錯落苔花斑人家隱約荒靄外但見籬落連柴關兩山中斷忽空曠下有碧水之潺湲幽人航葦迷逺近思致偃蹇無容攀定非鴟夷成霸業一舸五湖烟浪寛又非坡仙遊赤壁酒酣浩歌江月寒亦當拄杖横膝看南山心與白雲相對閒胡為厭山瞰芳渚岸草汀花適幽趣有聲詩畫無聲詩夏蟲未易寒冰語或云此本張季鷹蓴鱸忽憶扁舟輕蹇予有家歸未得一見秋風羽翼生採蓮分得底字溪風搖搖波瀰瀰十里芳華照清沚蘭舟女郎紅玉春日射新籹明水底芙蓉雙臉百媚生呉宫西施漢良娣藕腸折斷雪絲牽入手花枝香􅠩􅠩隔岸誰家貴公子調笑新詞歌艷體呉儂變風有如此誰念采蘋供祭禮哭姪學業方成二紀過虚舟一夕殞頽波死皆有命憐渠早老獨無依奈我何歸計雲山空莽蒼愁懷日月暗消磨白楊半夜風蕭瑟盡是吾兒薤露歌感懷世路羊腸劇險艱天心應厭著儒冠老無子息休心易貧有交親託事難文字售人真滯貨廉平養已似閒官羲經讀罷無人㑹庭竹蕭森夜月寒弔蕭同知蕭蘭一夕隕秋霜數載交情遽忍忘遊覽雲山春並轡笑談風雨夜連牀治心我謂當誠慤處已君言貴肅莊此理從今誰與論隰州松月渺蒼蒼上已日遊平湖微風漠漠水增波禊事重修繼永和脆管當筵清似語扁舟爭岸疾如梭一時人物成高㑹千里雲山入浩歌日暮芝蘭無處覔野花汀艸占春多送田茂卿赴都宿雨初晴草木齊一杯汾水恨分攜上林曉色多鸎友長路春風入馬蹄黄巻可能無斗禄青雲自是有天梯從來俊傑知時務莫為寒牕故紙迷和李子微邨居健羨南溪老幽居水石間心無塵事汨身與野雲閒院靜深藏竹牆低易得山蒲團香一炷花落鳥􅚓􅚓又别墅荒城外居閒事事幽栽松添野色接缿引溪流詩社分新韻村醪洗舊愁更求名與利騎鶴望揚州送李仲暉之洛西同是思鄉客君先著祖鞭驪駒歌落日去雁入高天莫戀河濱粟當耕谷口田親朋倘相問為報已衰年送馬德新馬弟吾鄉秀青雲正壯年四知雖自畏六戒得師傳秦府開賢路瀛洲列俊躔秋風黄鵠健老眼看高鶱贈皇甫德璋明德本生公醫名一代雄杖頭閒日月舌上舊家風雅趣錢神外高情酒聖中治人陰德在夀骨秀而豐和劉敏之韻城居寧不好未易著閒人客至慙無酒詩成莫療貧譚天雖有口無地可安身羡殺清江鷺生來不受塵秋日出郭離離禾黍滿郊墟棗實紅殷接野閭四十年來無史筆有年今日仗誰書和李濟夫韻午夢遊仙鳥喚迴竹陰埽地淨無埃莫言嘉客閒中少時有清風自往來荆公作古非今禍已成亦知鬼責與天刑試看一病遺言處猶勸傍人誦佛經襄陵北城溪坐楊柳陰陰水氣凉椒花䔩䔩野花香地偏愈覺似閒整始信壺天化日長閒述此性生而與道俱靈源常患少人疏楊侯一語崇經學士子爭相讀四書解作時文一二篇胷中意氣自掀然何如剖破醯雞甕看取人間大有天河汾諸老詩集巻二欽定四庫全書河汾諸老詩集巻三元房祺編
