seq: 8
front:
  text: 齋曹先生之謙益甫
  hash: sha256:2e0169970961d2aaa4836eac232e78f766bbe703023d489bd3136a1efbf49ecf
body:
  text: 送梁仲文聖人既已沒聖道遂不傳異端壅正途榛塞踰千年大儒起相承闢之斯廓然濂溪迴北流伊洛開洪源學者有適從披雲見青天我生雖多難聞道早有縁中歲苦病目不得深窮研梁君河東秀意氣凌孤鶱探道得奥閫辯説如河懸所知非茍知而亦允蹈焉出入口耳者彼我奚足言却來自秦京過我汾水邊未㡬復言别長途北之燕行看奮六翮高舉凌雲烟功成名遂後歸老河之湍相從講聖學與子長周旋感寓二首中林有幽蘭羅生雜衆艸地僻人不知芬芳空自好嚴霜凋古木歲晚難獨保願充君子佩探擷尚未早安得清風來吹香出林表又高梧夾金井脩竹連清池梧葉既薿薿竹實亦纍纍可栖復可食鳯鳥來何時重華不得見韶樂何能為日暮空歎息蕭瑟寒風吹變白頭吟梧桐不獨老鴛鴦亦雙死靜女懷貞心徇夫正如此奈何及末流不知再醮羞中路多反目㡬人能白頭君不見㑹稽愚婦輕負薪不肯終身事買臣一朝歸佩太守印悔望車塵那敢近人生賦命自不齊貧賤富貴各有時隨雞逐狗聽所適世事悠悠爭得知閒中作雄雞啼一聲驚起五更睡出門何擾擾競逐名與利㝠㝠車馬塵白日暗城市蕭條蓬蒿居獨有羲皇地高情杳秋雲靜性凝止水俛仰天地間澹然無一事東坡赤壁圖先生矯矯人中龍京塵千丈不可容五年一夢落江海翩然野鶴開囚籠雪堂閉門讀書史興來飄然弄雲水黄泥坂下醉三更赤壁磯頭航一葦明月清風共一江邁往之氣無由降酒酣作賦記清賞袖有巨筆如長杠一朝騎鯨尋李白人間俯仰成今昔續絃無處覔鸞膠見畫思公空歎息風雪障面圖頑雲暗空雪正飛老木殭折溪流澌弊裘羸馬奈寒子便面障風何所之僕夫徒行亦良苦吻噤不語心應語人生受凍分豈無但願不作君家奴秋日雜詩山中有佳人考槃歌在澗别來今㡬時歲月忽已晏相思不得書矯首望飛雁寄元遺山詩到䕫州老更工只今人仰少陵翁自憐奕世通家舊不得論文一笑同艸緑平原愁落日雁飛寒水怨秋風黄金鑛裏相思淚㡬墮憑高北望中秋日懷李仁卿獨倚斜陽百尺樓故人千里思悠悠陶唐祠下烟光晚姑射峰前雁影秋尊酒㡬時同李白雲山多處是并州臨風惆悵無人㑹一曲商歌寫暮愁麻信之為夀中州人物一元龍卓犖英才磈磊胷濁酒數盃遺世慮清詩千首傲侯封諸郎照眼三珠樹舊業關心五老峰頭白他年賦歸去綵衣扶杖看從容送王仲通從事西遊五見春翩翩書記日爭新懷鄉不作登樓賦佐府真為入幕賓世事忽驚翻手雨馬蹄又踏化衣塵古來燕趙多豪傑定有飛書薦鶚人上已日感懷舊游桃李涴丘塵十六年悲客裏春浮白可能澆磈磊踏青聊且慰酸辛蘭亭脩禊人何在庾信傷心賦又新芳艸喚愁花濺涙東風囘首一霑巾白菊數枝的皪照秋清何物為花乃寧馨玉骨冰肌誇皎潔風璫月珮想娉婷霜迎葉上迷青女露下籬邊泣素靈見説寒英能愈疾擬開三徑著茅亭紅葉枝上萎黄慘未乾嚴霜一夕總成丹色烘曉日燕脂暖影濯秋江蜀錦寒南雁數聲催晼晚西風㡬度見凋殘横山樓下梨千樹每憶童年九日看北宫光泰門邊避暑宫翠華南去㡬年中干戈浩蕩人情變池島荒蕪樹影空魚藻有基埋宿草廣寒無殿貯凉風登臨欲問前朝事紅日西沉碧水東題吉甫種德園培植功夫與日新風光别是一家春三株槐茂堂堪構九畹蘭芳佩可紉桃李陰成應有地棟梁材出豈無人從今不羨燕山竇五桂聯芳老一椿寄鄉中故人十年夢繞故山薇世事悠悠與願違華表未成遼鶴語青㝠空羨塞鴻歸雲横北嶺迷鄉眼塵滿西風涴客衣為報吾州舊親識短書相慰莫令稀送侯君美歸雲中暫時相見又相違留滯天涯更易悲客淚清和秋雨落鄉心杳逐朔雲飛路經險阻行須穩書報平安寄莫遲邂逅故人如問我為言貧病未能歸自趙城還府簡子城邊過盡春却尋歸路並清汾落花亂逐溶溶水逺樹低連漠漠雲姑射雨晴山似染洞羊風暖草如薰獨憐疲俗誅求困愁歎聲多不可聞讀唐詩鼔吹傑句雄篇萃若林細看一一盡精深才高不似人間語吟苦定勞天外心白璧連城無少玷朱絃三歎有遺音不經詩老遺山手誰解披沙揀得金弔王内翰從之往年高步到瀛洲豈料東陵是故侯庾信竟歸周室老劉楨真有岱宗遊山瞻斗仰名空在桂折蘭摧恨未休鬱鬱佳城滹水上野烟寒草木經秋上韓應州天挺英雄入彀中堂堂自有古人風乘機力贊興龍業唾手能收汗馬功四海威名方共仰一時才武更誰同潁川不是留黄霸行拜中書作相公懷劉京叔奕世金蘭契於今只有君英才殊落落餘子謾紛紛一别㡬春草相思空暮雲何時展良覿把酒共論文宿雲臺觀趨程疲永路記宿喜琳宫蓮嶽三峰對松林一逕通地偏殘暑失境靜俗塵空入夜清詩夢山泉落枕中中條阻雨行李淹蒲坂歸期念晉州高風千葉下寒雨一山秋澗響頻驚夢蟲聲亂入愁酒醒孤館裏心折大刀頭初秋雨後積雨蕩煩暑迴風吹早凉老苔翻舊碧病葉墮新黄久客應吾道浮生半異鄉黑貂渾弊盡愁看一開箱九日幽闕二字懶慢令節廢招尋無復歡娛地空驚闕三字閉門黄菊晚步屧紫苔深尚友陶彭澤悠然闕三字雁北塞迎霜雪西風送羽翰數行天澹澹萬里路漫漫日落秋聲急江空暮影寒故人書斷絶矯首望雲端幽居有感閒居仍地僻門閉艸萊深車馬無還往詩書有討尋嚴霜催歲晚破屋覺寒侵計拙煩親舊誰能數賜金秋風亭故基危亭冠雉堞飛構何崔嵬一夕墮刼火變化成烟灰頽基翳蓬蒿壞道封莓苔蕭條古城上空有秋風來除夜三十七年過勞生强半休此心空耿耿吾道每悠悠感物百憂集思親雙淚流春風添一歲又是五更頭送李郭一子還鄉喪亂身為客淹留涙滿衣亦知生處樂未卜有年歸祖帳臨寒水仙舟漾夕暉春來一相送腸斷故山薇中書耶律公挽詞虎嘯龍興際乘時自有人風雲開慘淡天地入經綸忽報台星坼仍傳薤露新斯民感無極灑涙叫蒼旻應州廟學釋奠夜色齋㕑肅秋風殿宇清右文遭聖代備禮引諸生牢醴嚴三獻豆籩陳兩楹祭餘同飲福旭日樹頭明送李端卿東行故人有所適驅馬出東城紅樹添秋色青山滿去程曾為同省掾偏愴逺離情别後能相憶因風為寄聲子猷訪戴圖興盡空迴雪夜舟訪人虚語亦悠悠須知汾水多竒士豈獨王家一子猷梅影隔牕渾似李夫人江月多情為返魂宛是依依舊顔色向人憔悴立黄昏秋夜寂寂江城夜向闌西風吹雁叫雲端一聲逺過南樓去月滿碧天秋水寒臨潼溫泉琢玉為池浴太真芙蓉花暖水生春誰知寂寞千秋後留與行人洗路塵長安早發行李怱怱滻水頭雨餘凉氣動新秋五更馬上還家夢先逐西風到晉州秋夜聞笛雲淨寒空月滿樓何人横玉呌清秋梁州才罷伊州起不盡關山此夜愁廢宫斷磚殘礎碎盤花輦路荒凉蔓艸遮玉殿朱樓俱不見壞牆嶾嶙遶人家過茹越嶺有感山川良是昔人非北望松楸淚滿衣三十餘年成底事全家南渡一身歸蒲津晚渡黄河城下水沄沄船去船來㡬夕曛老盡津頭垂釣客柳陰相對白鷗羣河汾諸老詩集巻八河汾諸老詩集跋河汾諸老諸集者迺大同路儒學教授房先生之所編也予一日得之惜乎諸老一代髙名百年清氣已嘗遍白于天下是集未嘗流布也皇慶癸丑夏特命工鋟木以廣其傳然而諸老之學又豈専乎詩也出處大畧巳具前序今書是説以告夫後之學者不為無益云六月吉日尊賢堂高昻霄具白
