front:
  text: 子京
  hash: sha256:57676d4a487e0d079c04d38c4dd7c35d8f5b390438a3fbb5bef26c908fad3286
body:
  text: 送麻信之内鄉山居四海紛挐戰虎龍驚麕無計脱圍中莫貪利禄招時忌要學聱牙與世同汝水應逢寒食雨淅川行趂舞雩風離心洗蕩方如許莫上危樓聽斷鴻弔麻信之二首弊屣功名懶著鞭劇談豪放本天然閒來每愛從人語醉裏何妨對客眠體瘁漸成中酒病家貧全仰賣碑錢堂堂一去今何在三尺孤墳罩野烟又風采瓊林未足侔一朝零落委山丘君恩未賜金蓮炬天闕俄成白玉樓詩類貫珠尤可翫室如懸磬更堪憂路遙未暇憑棺奠悵望中條涕泗流答楊煥然二首梁苑當年記盛遊亂離南北恨遲留且教紅袖歌金縷莫對青山數白頭人似贊皇遷蜀郡詩如子美到䕫州傳家况有𤣥文在應使童烏繼纂修又獻賦當年覲紫宸羨君藻思獨超羣扶持吾道難尤力潤色斯文老更勤學際天人寧有伴文如風水自成紋何時載酒清伊上竒字時來問子雲清明後書懷花氣薰人動竹齋貪春狂思若為裁蜂黏落絮飛還墜燕認新巢去復來亂後精魂猶夢境貧中風景剩詩才江山信美非吾土懷抱何時得好開送孟駕之赴闕文史相從二十年歲寒心事久彌堅向來才力驚游刃此去功名穩著鞭淺緑美依沙漠草横青遙指拂廬烟應將萬字匡時策挽取恩波下九天病後贈姚仲寛居士寂寂柴關晝不開虚簷獨步意徘徊百年素業南柯夢一寸丹心古鼎灰野老相過聊問訊溪禽近啄不驚猜好竒誰是劉公子肯為揚雄載酒來有懷家兄子颺蕭蕭雙鬢半成絲亹亹襟懷抱所思趨向自知違俗好文章只合伴兒嬉嵩西晚照霞明處洛汭秋風雁過時中有先人弊廬在與君何日理茅茨贈李彦誠五嶽分崩四海傾便宜一别盡今生艱難契闊重相見四十餘年老弟兄峴山秋晚圖當年叔子愛兹山陵谷囘頭㡬變遷縱使豐碑今尚在遊人誰復一澘然題師嵓卿蒲中八詠蒲津晚渡中條山色照黄河競渡行人晚更多城上危樓倚霄漢凭欄有客正悲歌虞坂曉行五更風露正清㝠馬首殘蟾分外明好句墮前俄失去微吟倐過古虞城舜殿薰風德化當年被海隅熈熈物性盡昭蘇不知今日吾民慍一聽琴聲解得無首陽晴雪山頭晴雪照城樓潑水融銀眩兩眸蕩滌寒威須美醞浮香醽醁夜來篘東林夜雨瀟瀟寒雨濕觚稜古殿長廊夜氣增此地此時誰得意龕燈一㸃坐禪僧西嵓疉巘螺髪煙鬟矗萬峰行人指㸃梵王宫鳥飛杳靄蒼茫外人在霏微空翠中媯汭夕陽水曲山阿古樂鄉聖謨曽此降英皇遺風欲問應無處破屋頽垣半夕陽王屋飛湍表聖當年愛此山倚楼終日看飛湍後人空飲貽溪水不學先生便掛冠河汾諸老詩集巻四欽定四庫全書河汾諸老詩集巻五元房祺編
