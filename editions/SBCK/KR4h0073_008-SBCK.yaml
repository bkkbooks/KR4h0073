front:
  text: 河汾諸老詩集卷之八
  hash: sha256:07ad80b0dd99f6f39d0e7cddff081b70d7164eeabd2f0c54fb885d8cf480b0a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_008-1a}
body:
  text: 横汾􅀮者房祺編兊齋曹先生之謙益甫送梁仲文聖人旣巳沒聖道遂不傳異端壅正途榛塞踰千年大儒起相承闢之斯廓然濂溪逥北流伊洛開洪源學者有適從披雲見青天我生雖多難聞道早有縁中歳苦病目不得深窮研梁君河東秀意氣􅇒􅀌騫探道得奥閫辯説如何懸所知非為而亦舀焉出口耳者彼我奚足言却来自􅁗京過我汾水􅁁未㡬復言别長途北之燕行看􅁬六翮髙舉凌雲煙功成名遂後歸老河之湍相從講聖學與子長周旋感寓一首中林有幽蘭蘿生雜衆草地僻人不知芬芳空自好嚴霜凋古木歳晚難獨保願充君子佩探擷尚未早安得清風来吹香出林表髙林夾金井脩竹連清池梧葉既薿薿竹實亦纍纍可栖復可食鳯鳥来何時重華不得見韶樂何䏻為日暮空嘆息蕭瑟寒風吹變白頭呤梧桐不獨老鴛鴦亦􅀟死靜女懐真心循夫正如此柰何及末流不知再醮羞中路多反目幾人䏻白頭君不見㑹稽愚婦䡖􅀒薪不肯終身事買臣一朝歸佩太守印悔望車塵那敢近人生賦命自不齊貧賤富貴各有時隨鷄逐狗聽􅀁適世事悠悠争得知閑中作雄雞啼一聲驚起五更睡出門何擾擾競逐名與利􅄀㝠車馬塵白日暗城市蕭條蓬蒿居獨有犧皇地髙情杳秋雲静性凝止水俛仰天地間澹然無一事東坡赤壁圖先生矯矯人中龍京塵千丈不可容五年一夢落江海翩然野鶴開囚籠雪堂閉門讀書史興来飄然弄雲水黄泥坂下醉三更赤壁磯頭航一􅓗明月清風共一江邁徃之氣無由降酒酣作賦記清賞䄂有巨筆如長杠一朝􅀐鯨尋李白人間俯仰成今昔續絃無處覔鸞膠見􅀞思公空嘆息風雪障面圖頑雲暗空雪正飛老木殭折溪流澌弊裘羸馬柰寒子便面障風何所之僕夫徒行亦良苦吻噤不語心􅀿語人生受陳分豈無但願不作君家奴秋日雜詩山中有佳人考盤􅁔在澗別来今㡬時歳月忽巳晏相思不得書矯首望飛鴈􅀉元遺山詩到䕫州老更工只今人仰少陵翁自憐奕世通家舊不得論文一􅀏同草緑平原愁落日鴈飛寒水怨秋風黄金鑛裏相思淚㡬墮憑髙北望中秋日懐李仁卿獨􅀝斜陽百尺樓故人千里思悠悠陶唐祠下煙光晚姑射峰前鴈影秋尊酒㡬時同李白雲山多處是并州臨風惆悵無人㑹一曲啇􅁔寫暮愁麻信之爲夀中州人物一元龍卓犖英才磈磊􅅐濁酒數盃遺世慮清詩千首傲侯封諸郎照眼三株樹舊業􅀜心五老峰頭白他年賦歸去綵衣扶杖看從容送王仲通從事西逰五見春翩翩書記日爭新懐郷不作登楼賦佐府真為入幕賔世事怱驚飜手雨馬蹄又踏化衣塵古来燕趙多豪傑定有飛書薦鶚人上巳日感懐舊㳺桃李涴丘塵十六年悲客裏春浮白可䏻澆磈磊踏青聊且慰酸辛蘭亭脩褉人何在􅁃信傷心賦又新芳草喚愁花濺淚東風回首一霑巾白菊數枝的皪照秋清何物為花乃寜馨玉骨冰肌誇皎潔風璫月珮想娉婷霜迎葉上迷青女露下籬􅁁泣素靈見説寒英􅀎愈疾擬開三逕著茅亭紅葉枝上萎黄慘未乾嚴霜一夕緫成丹色烘暁日燕脂暖影濯秋江蜀錦寒南鴈數聲催晼晚西風幾度見凋殘横山樓下梨千樹毎憶童年九日看北宫光泰門􅁁避暑宫翠華南去㡬年中干戈浩蕩人情變池島荒蕪樹影空魚藻有基埋宿草廣寒無殿貯涼風登臨欲問前朝事紅日西沉碧水東趙吉甫種徳園培植功夫與日新風光別是一家春三秋槐茂堂堪􅌟九畹蘭芳佩可紉桃李隂成􅀿有地棟梁材出豈無人從今不羡燕山竇五桂聮芳老一椿􅀉郷中故人十年夢繞故山􅅔世事悠悠與願違華表未成遼鶴語青􅄀空羡塞鴻歸雲横北嶺迷郷眼塵滿西風涴客衣爲報吾州舊親識短夀相慰莫令稀送侯君羙歸雲中暫時相見又相違留滯天涯更易悲客淚清和秋雨落郷心杳逐朔雲飛路經險阻行須穏書報平安􅀉莫遲邂逅故人如問我為言貧病未䏻歸自趙城還府簡子城􅁁過盡春􅁍尋歸路竝清汾落花乱逐溶溶水逺樹􅊠連漠漠雲姑射雨晴山似染洞羊風暖草如薫獨怜疲俗誅求困愁嘆聲多不可聞讀唐詩皷吹傑句雄篇萃若林細㸔一一盡精深才髙不似人間語吟苦定勞天外心白璧連城無少玷朱絃三嘆有遺音不經詩老遺山手誰觧披沙㨂得金吊王内翰從之性年髙歩到瀛州豈料東陵是故侯􅁃信竟歸周室老劉禎真有岱宗逰山瞻斗仰名空在桂折蘭摧恨未休鬰鬰佳城滹水上野煙寒草木經秋上韓􅀿州天挺英雄入彀中堂堂自有古人風乘機力􅐌興龍業唾手􅀎􅀵汗馬功四海威名方共仰一時才武更誰同潁川不是留黄覇行拜中書作相公懐劉京叔奕世金蘭契於今只有君英才殊落落餘子謾紛紛一別㡬春草相思空暮雲何時展良覿把酒共論文宿雲臺􅀚趍程疲永路記宿喜琳宫蓮嶽三峯對松林一逕通地偏俗塵空入夜清詩夢山泉落枕中中條阻雨行李淹蒲坂歸期念晉州髙風千葉下寒雨一山秋澗響頻驚夢蟲聲乱入愁酒醒􅀌館裏心折大刀頭初秋雨後積雨蕩煩暑迴風吹早凉老苔翻舊碧病葉墮新黄乆客􅀿吾道浮生半異郷黒貂渾弊盡愁看一開箱九日幽􅂴慢令節癈招尋無復􅂬娱地空驚閉門黄菊晚歩屧紫苔深尚友陶彭澤悠然鴈北塞迎霜雪西風送雨翰數行天澹澹萬里路漫漫日落秋聲急江空暮影寒古人書㫁絶矯首望雲端幽居有感閑居仍地僻門閉草萊深車馬無還往詩書有討尋嚴霜催歳晚破屋覺寒侵計拙煩親舊誰䏻數賜金秋風亭故基危亭冠雉堞飛􅌟何崔嵬一夕隨劫火變化成煙􅁅頽基翳蓬蒿壊道封莓苔蕭條古城上空有秋風来除夜三十七年過勞生强半休此心空耿耿吾道毎悠悠感物百􅁨集思親双淚流春風􅄈一歳又是五更頭送李郭二子還郷喪乱身為客淹流淚滿衣亦知生處樂未卜有年歸祖帳臨寒水仙舟􅃞夕暉春来一相送腸断故山􅅔中書耶律公挽詞虎嘯龍興際乘時自有人風雲闇慘淡天地入經綸忽報台星坼仍􅀓薤露新斯民感無極洒淚呌蒼旻􅀿州廟學釋奠夜色齋厨肅秋風殿宇清右文遭聖代􅇱禮引諸生牢醴嚴三献豆􅁁陳兩楹􅀕餘同飲福旭日樹頭明送李端卿東行故人有􅀁適驅馬出東城紅樹􅄈秋色青山滿去程曽為同省􅁺偏愴逺離情别後䏻相憶因風為守聲子猷訪戴圖興盡空迴雪夜舟訪人虚語亦悠悠須知汾水多竒士豈獨王家一子猷梅影隔䆫渾似李夫人江月多情爲返魂宛是依依舊顔色向人憔悴立黄昏秋夜寂寂江城夜向閑西風吹鴈呌雲端一聲逺過南樓去月滿碧天秋水寒臨潼温泉琢玉爲池浴太真芙蓉花暖水生春誰知寂寞千秋後留與行人洗路塵長安早發行李怱怱滻水頭雨餘凉氣動新秋五更馬上還家夢先逐西風到􅀳州秋夜聞笛雲净寒空月滿樓何人横玉叶清秋梁州罷伊州起不盡関山此夜愁廢宫㫁磚殘礎碎盤花輦路荒凉蔓草􅃒玉殿朱樓俱不見壊墻嶾嶙遶人家過茹越嶺有感山川良是昔人非北望松楸淚滿衣三十餘年底底事全家南度一身歸
