front:
  text: 河汾諸老詩集卷之六
  hash: sha256:47ebb994fdd4e9bc1c0b44c7fff8e008b8ab97b15691cd5a8a45e8fc220ce96d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_006-1a}
body:
  text: 横汾隠者房祺編遯庵叚先生克已復之乙巳清明逰青陽峽東山氣象太猛悍萬馬駸駸来楚甸中分不肯割鴻溝鍜礪戈矛期一戰西山折北如西漢獨餘綘􅈅奔而殿誰為劉向决雌雄頼有韓彭力相援盧溝直下两水合泯泯暗流通一線突為瀑布出山口流沫成輪浪成旋前途百歩落石甕黛蓄亭渟那敢眄沈沈南去􅀂白虹為嶼為汦互隠見鑿開混沌㡬千秋世俗雖見如不見今人雖有筆如椽為冩佳名傅寓縣人間佳節重清明呼兒折簡招諸彦一生䏻著幾兩屐佳處毎欲經行徧山靈著意􅂆逰人呑吐煙霞生萬變山河玉女跪焚香嵓畔仙人一􅀏倩坐者儼若帝王尊劔佩雍容侍閑宴植者磊落如鉅人聚立廣庭議封禪扶者矯矯如勇夫執戈戺花著綦弁平灘淺瀬年可掲溪路曲隨峰势轉􅁑屨偏冝苔蘚滑行􅁭時􅀍薔􅅔骨當面煙嵐翠舞蛟出岫閑雲飄素練群行不復事拘撿眼正明時脚還倦班荆共坐溪上石粔籹濁醪具時饌良辰無柰夕陽催羽觴正要清􅁔薦醒心况復有寒泉玉池遄返成三嚥三分春色二分休風外飛花時一片古人行樂欲及時半百之前猶掣電惟有愛山縁未㫁夢􅄰孱顔􅄈健羡一窮到骨不自治虚􅀒􅅐中書萬卷謾向山村老却人生来不識荆州靣府肺槎牙倩酒澆顧我非狂亦非狷紛紛世上無真是棄置從渠若秋扇歸来新月偃林稍寂寞衡門掩深院題興公靜樂庵我爱興上人閑處先著脚雖有買山錢難尋一丘􅊤向来栖息地龍像乆寂寞重尋林下徑竹石􅀂紛薄溪水恣交流嵓花自開落却掃丈室中一鉼還一鉢静樂題其顔塵縁聊觧縳寥寥千歳下此理誰發樂我今為拈出不免一重錯有浄必有垢無苦亦無樂混沌元不死七竅剛自鑿珎重庵中人萬法本無者獨有太古心油然滿寥廓冬夜自適四壁摧頽手重泥一枝隨意足成棲歸来巳化千年鶴老去慵聽半夜鷄世事榮枯都是幻物情長短不須齊寸心耿耿何人㑹隠几寒牕片月低中秋二首萬􅄜声沉暮靄収長河㵼浪洗清秋遥天千里淡如水明月一輪光滿樓隨意傾銀謀勝賞誰家横玉調新愁可怜白首蟾宫客羞對嫦娥説舊㳺夜凉河漢靜無聲澄澈天開萬里晴蟾􅄍寒光呈皎潔桂排踈影極分明良宵方喜故人共醉語那知鄰舎驚一片詩魂􅀵不得九霄直與月俱清雲中暮雨在禹門古壘雲藏一徑㣲河山依舊昔人非貪徴徃古興亡事不覺城頭雨濕衣憶梅姑射仙人冰雪膚昔今伴我向西湖別来幾度春風换摽格而今似舊無與隠之㑹午芹精舎酒間雨作麥田日日起黄埃官長憂民意不開底是山靈相嫵媚故驅風雨過江来楸花楸樹馨香見未曽墻西碧盖聳􅀌稜㑹須雨洗塵埃盡看吐髙花一萬層河汾諸老詩集卷之六
