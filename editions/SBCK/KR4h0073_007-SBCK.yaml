front:
  text: 河汾諸老詩集卷之七
  hash: sha256:bc5f2b587e6b564800036ca1cb781a618d94e2b32eef0c706a65b320e4a41409
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_007-1a}
body:
  text: 横汾隠者房祺編菊軒叚先生成巳誠之題容安堂陳子少英邁逸氣不可挫典刑肖乃翁出語輙驚座行止非􅀁􅀎造物聽掀簸功名鷹在鞲歳月蟻旋磨區區一室中十載供史課結廬慕淵明志向有許大淡墨冩形似終日相對坐一室足我容百念付慵惰青山隠簷楹流水出階左植花數十叢種竹千百箇事来若機張事去如瓶墮浩然方寸間不受一塵汚豈無二仲賢閑暇日相過有酒相獻酬有詩互賡和溪山入􅀏談珠玉霏咳唾徜徉天地間一物莫非我醉来語更真卿去我將臥主人正髙眠山鳥莫啼破題梁氏靜樂堂攘攘區中人役心名與利於身竟何有乾没不少置叔敬有耳孫犖犖與時異一官不肯覔閑居飬髙志築室塵境中中有塵外意方其厭囂啾歸来行少墍牀頭一卷書静洗紛華累苟䏻樂其樂寧復事吾事見客不吝情有酒即成醉為問東華塵何如北牎睡清風吹我懐萬事覺無味誰知方寸間自有清凉地蘇氏承顔堂登僊不羡飛􅀟鳬宰官不樂紓金珠行年四十著綵服悲啼效作兒聲􅈱丈夫豈無四方志􅀝閭望望心何如家國無事壽觴舉慈顔得酒增和舒客来草具對客食殺雞奉母其榮華富貴固􅀁願有子䏻盡如君不動古未有悦親自得神明扶茁㢤人生孟林笋圉言日出姜泉魚古来孝感有如此今人盖以古為模嘗聞古有色難戒愛深容色何愉愉詩成不覺涕淚俱尓有毋遺傷獨無他年誰作孝友傳請録吾語為君書題秋暮山行圖乱山嵂崒争清妍寒林寂歴相綿聮人間黄塵千萬丈一􅀧不到山林􅁁秋光淡薄秋氣爽浮雲積翠何葱芊髙風凄其脱木葉向来面目仍増姢江流一曲抱山麓􅀌舟斜日栖江湍行人何適来􅀒擔腰膂犖确石頭路蹇馿鞭不前人家前塗渺何許望之不及憂悁悁問公何從得此本筆势髣髴營丘傳我本山中人見之心惘然崁歴落真可􅀏對􅀞題詩思昔年送孫仲文行䑓之召仲也何人斯不滿六尺長言議間英發入耳音琅琅􅅐懐湛秋水面目嚴清霜讀書及城且寓跡鳬鶩行自公少餘暇婉愉奉髙堂甘㫖未及親有飯不敢嘗顔色或未怡綵又戯親傍執喪三年中哀慕如新䘮囬思顧復劳此意何時忘日聞辟書下且喜還且傷捧檄念吾親不覺涕泗滂㧞英外臺選列布皆珪璋􅁺吏湏㡬人亦必求循良世人豈無才要以徳自将紏擿誰弗䏻吾心恐無常詩人有明誡茹柔􅄍其剛孝為百行先子孝吾既詳苟䏻推此心前路未易量慇懃飬雲翼行矣勿怱忙醒心亭䆫前流水玉冷冷䆫下髙人酒半醒喚省邯鄲枕中夢如看王湛案頭經翛然自得天逰趣恍若那知地境靈説似功名場上客倦㳺時節一来聽送尋正道江􅁁楊柳􅅻堪折陌上行人還又別春光不觧苦留人两岸楊花飛白雪江風揺揺吹緑波欲別未別傷如何願君少住聽我歌後日重来白髮多䟦三堂王自寫真觧去盤礴真􅀞史不特濡毛知可矣􅁑仙草服常􅀞我意􅁒置我山嵓裏虎頭于今㡬百年與渠誰後復誰先翛然蜕跡乘風去一笑相逢喜拍肩䟦秦得真墨晴䆫不用辨犀紋墨妙秦郎巳飫聞翠餅瑩如雅背浄玉圖香鄙麝臍薫永寜賜弟今猶少易水無良古亦云老我媿非揮翰手两丸投贈􅀒伊勤送馮資深西歸人間蠻觸日干戈暮四朝三䏻㡬何歸去不憂瓶粟罄西山雨足蕨􅅔多蕭蕭華髮老書生乆欲歸田計未成喜聽日􅁁消息好故山容得子真耕三年思慮謾营营重見浮山眼倍青􅎍次無塵元自好床頭况有洗心經侯門稚子喜歸来暖􅀬都無酒一杯抖擻滿身塵土盡􅁭懐還對好山間嗅梅玉骨那愁瘴霧傷好將經卷伴南荒坡仙鼻孔清如水老覺朝雲道氣長題張郎中明皇小决圖志在驅馳禍巳胎􅀏顔况更為誰開貧争飛鞠鞭􅐒去不覺踰有􅎷来天寳承平事乆無弄丸馿背恣驅馳不期一􅀏宫中戯傳作人間小决圖如夢庵覺時還􅀏夢時訛夢覺其間有㡬何聊爾藏身大槐國臥看明月上南柯虞坂暁行林外晨雞苐一聲隴頭殘月伴人行未知局促鹽車下老驥蕭蕭又㡬鳴首陽晴雪􅅔􅁔一曲對青山萬古千秋老翠巒望断空嵓人不見光揺銀海玉峯寒書師嵓卿蒲中八詠圖老大溪山入夢頻聊慿圖􅀞冩情真歸歟不及身强徤山有英靈恐􅀏人河汾諸老詩集卷之七
