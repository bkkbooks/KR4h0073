front:
  text: 河汾諸老詩集卷之四
  hash: sha256:429352ee0c9fe0962e80e2c5888ddc77cbb75acabc31ae8b397067d3cb5c7e5c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_004-1a}
body:
  text: 横汾隠者房祺編陳先生庚子京送麻信之内郷山居四海紛挐戰虎龍驚麕無計脫圍中莫貪利禄招時忌要學聱牙與世同汝水應逢寒食雨川行舞雩風離心洗蕩方如許莫上危樓聽断鴻吊麻信之弊屣功名懶著鞭劇談豪放本天然毎愛從人語醉裏何妨對客眠体瘁漸成酒病家貧全仰賣碑錢堂一去今何在三尺孤墳罩野煙風采瓊林未足侔一朝零落委山丘君㤙未賜金蓮炬天闕俄成白玉樓詩珠尤可翫空如懸磬更堪憂路遥未暇憑棺奠悵望中條涕泗流荅楊煥然二首梁苑當年記盛遊乱離南北悵遲留且教紅似金縷莫對青山嘆白頭人似賛遷蜀郡詩如子羙到䕫州傳家况有玄文應使童烏継纂修獻賦當年覲𬗋宸羡君藻思獨超群扶持吾道難尤力潤色斯文老更勤學際天人寧有伴文如風水自成紋何時載酒清伊上寄字時来問子雲清明後書懐花氣薫人動竹齋貪春狂思若為栽蜂粘落絮飛還墜燕認新巢去復来乱後精魂猶夢境貧中風景剩詩才江山信羙非吾土懐抱何時得好開送孟駕之赴闕文史相從二十年歳寒心事乆彌堅向来才力驚㳺刃此去功名穏著鞭淺緑羙依沙漠草横青遥指拂廬煙應将萬字臣時䇿挽取恩波下九天病後贈姚仲寛居士寂寂柴關晝不開虚􅉉獨歩意徘徊百年素業南柯夢一寸丹心古鼎灰野老相過聊問訊禽近啄不驚猜好竒誰是劉公肯為楊雄載酒来有懐家兄子颺蕭蕭雙鬢半成絲亹亹襟懐抱所思趍向自知違俗好文章只合伴兒嬉嵩西晚照霞明處洛汭秋風鴈過時中有先人弊廬在與君何日理茅茨贈李彦誠五嶽分崩四海傾便冝一别盡今生艱難契闊重相見四十餘年老弟兄峴山秋晚圖當年叔子愛兹山陵谷囬頭幾變遷縱使豐碑今尚在逰人誰復一􅏰然題師嵓卿蒲中八詠蒲津晚渡中條山色照黄河競渡行人晚更多城上危樓倚霄漢凭欄有客正悲歌虞坂暁行五更風露正清冥馬首殘蟾分外明好句墮前俄失去㣲吟倐過古虞城舜殿熏風徳化當年被海隅熈熈物性盡照蘇不知今日吾民愠一聽琴聲觧得無首陽晴雪山頭晴雪照城楼潑水融銀眩兩眸蕩滌寒城須羙醖浮香醽醁夜来蒭東林夜雨瀟瀟寒雨濕觚稜古殿長廊夜氣増此地此時誰得意龕澄一點坐禪僧西嵓疊巘螺鬟煙髮矗萬峰行人指點梵王宮烏飛杳靄蒼茫外人在霏霺空翠中媯汭夕陽水曲山河古樂郷聖謨曽此降英皇遺風欲問應無處破屋頽垣半夕陽王官飛湍表聖當年愛此山倚楼終日看飛湍後人空飲貽溪水不學先生便挂冠河汾諸老詩集卷之四
