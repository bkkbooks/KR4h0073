front:
  text: 河汾諸老詩集卷之四
  hash: sha256:429352ee0c9fe0962e80e2c5888ddc77cbb75acabc31ae8b397067d3cb5c7e5c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_004-1a}
body:
  text: 橫汾隱者房祺編陳先生庚子京送麻信之內鄉山居四海紛拿戰虎龍驚麕無計脫圍中莫貪利祿招時忌要學聱牙與世同汝水應逢寒食雨川行舞雩風離心洗蕩方如許莫上危樓聽斷鴻吊麻信之弊屣功名懶著鞭劇談豪放本天然每愛從人語醉裏何妨對客眠體瘁漸成酒病家貧全仰賣碑錢堂一去今何在三尺孤墳罩野煙風采瓊林未足侔一朝零落委山丘君恩未賜金蓮炬天闕俄成白玉樓詩珠尤可玩空如懸磬更堪憂路遙未暇憑棺奠悵望中條涕泗流答楊煥然二首梁苑當年記盛遊亂離南北悵遲留且教紅似金縷莫對青山嘆白頭人似贊遷蜀郡詩如子美到䕫州傳家况有玄文應使童烏繼纂修獻賦當年覲𬗋宸羡君藻思獨超群扶持吾道難尤力潤色斯文老更勤學際天人寧有伴文如風水自成紋何時載酒清伊上寄字時來問子雲清明後書懷花氣薰人動竹齊貪春狂思若為栽蜂粘落絮飛還墜燕認新巢去復來亂後精魂猶夢境貧中風景剩詩才江山信美非吾土懷抱何時得好開送孟駕之赴闕文史相從二十年歲寒心事久彌堅向來才力驚遊刃此去功名穩著鞭淺緑美依沙漠草橫青遙指拂廬煙應將萬字臣時䇿挽取恩波下九天病後贈姚仲寬居士寂寂柴關晝不開虛􅉉獨步意徘徊百年素業南柯夢一寸丹心古鼎灰野老相過聊問訊禽近啄不驚猜好竒誰是劉公肯為楊雄載酒來有懷家兄子揚蕭蕭雙鬢半成絲亹亹襟懷抱所思趍向自知違俗好文章只合伴兒嬉嵩西晚照霞明處洛汭秋風鴈過時中有先人弊廬在與君何日理茅茨贈李彥誠五嶽分崩四海傾便冝一别盡今生艱難契闊重相見四十餘年老弟兄峴山秋晚圖當年叔子愛兹山陵谷回頭幾變遷縱使豐碑今尚在逰人誰復一􅏰然題師嵓卿蒲中八詠蒲津晚渡中條山色照黃河競渡行人晚更多城上危樓倚霄漢憑欄有客正悲歌虞坂曉行五更風露正清冥馬首殘蟾分外明好句墮前俄失去微吟倐過古虞城舜殿熏風德化當年被海隅熙熙物性盡照蘇不知今日吾民愠一聽琴聲解得無首陽晴雪山頭晴雪照城樓潑水融銀眩兩眸蕩滌寒城須美醖浮香醽醁夜來芻東林夜雨瀟瀟寒雨濕觚稜古殿長廊夜氣增此地此時誰得意龕澄一點坐禪僧西嵓疊巘螺鬟煙髮矗萬峰行人指點梵王宮烏飛杳靄蒼茫外人在霏霺空翠中媯汭夕陽水曲山河古樂鄉聖謨曽此降英皇遺風欲問應無處破屋頽垣半夕陽王官飛湍表聖當年愛此山倚樓終日看飛湍後人空飲貽溪水不學先生便挂冠河汾諸老詩集卷之四
