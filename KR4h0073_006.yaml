front:
  text: 河汾諸老詩集卷之六
  hash: sha256:47ebb994fdd4e9bc1c0b44c7fff8e008b8ab97b15691cd5a8a45e8fc220ce96d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_006-1a}
body:
  text: 橫汾隱者房祺編遁庵假先生克已復之乙巳清明逰青陽峽東山氣象太猛悍萬馬駸駸來楚甸中分不肯割鴻溝煆礪戈矛期一戰西山折北如西漢獨餘綘灌奔而殿誰為劉向決雌雄賴有韓彭力相援盧溝直下兩水合泯泯暗流通一線突為瀑布出山口流沫成輪浪成旋前途百步落石甕黛蓄亭渟那敢眄沈沈南去若白虹為嶼為汦互隱見鑿開混沌幾千秋世俗雖見如不見今人雖有筆如椽為寫佳名傅寓縣人間佳節重清明呼兒折簡招諸彥一生能著幾兩屐佳處每欲經行遍山靈著意勸逰人吞吐煙霞生萬變山河玉女跪焚香嵓畔仙人一笑倩坐者儼若帝王尊劔佩雍容侍間宴植者磊落如巨人聚立廣庭議封禪扶者矯矯如勇夫執戈戺花著綦辨平灘淺瀨年可揭溪路曲隨峰勢轉葛屨偏冝苔蘚滑行襟時𬒳薔薇骨當面煙嵐翠舞蛟出岫間雲飄素練群行不復事拘撿眼正明時腳還倦班荆共坐溪上石粔籹濁醪具時饌良辰無奈夕陽催羽觴正要清歌薦醒心况復有寒泉玉池遄返成三咽三分春色二分休風外飛花時一片古人行樂欲及時半百之前猶掣電惟有愛山緣未斷夢寐孱顔添健羡一窮到骨不自治虛負胸中書萬卷謾向山村老却人生來不識荆州靣府肺槎牙倩酒澆顧我非狂亦非狷紛紛世上無真是棄置從渠若秋扇歸來新月偃林稍寂寞衡門掩深院題興公靜樂庵我愛興上人間處先著腳雖有買山錢難尋一丘􅊤向來栖息地龍像久寂寞重尋林下徑竹石若紛薄溪水恣交流嵓花自開落却掃丈室中一鉼還一鉢靜樂題其顔塵緣聊解縳寥寥千歲下此理誰發樂我今為拈出不免一重錯有淨必有垢無苦亦無樂混沌元不死七竅剛自鑿珍重庵中人萬法本無者獨有太古心油然滿寥廓冬夜自適四壁摧頽手重泥一枝隨意足成棲歸來巳化千年鶴老去慵聽半夜雞世事榮枯都是幻物情長短不須齊寸心耿耿何人會隱几寒窗片月低中秋二首萬籟聲沉暮靄收長河㵼浪洗清秋遙天千里淡如水明月一輪光滿樓隨意傾銀謀勝賞誰家橫玉調新愁可憐白首蟾宫客羞對嫦娥説舊遊夜涼河漢靜無聲澄徹天開萬里晴蟾吐寒光呈皎潔桂排踈影極分明良宵方喜故人共醉語那知鄰舍驚一片詩魂收不得九霄直與月俱清雲中暮雨在禹門古壘雲藏一徑微河山依舊昔人非貪徴往古興亡事不覺城頭雨濕衣憶梅姑射仙人冰雪膚昔今伴我向西湖別來幾度春風换摽格而今似舊無與隱之會午芹精舍酒間雨作麥田日日起黃埃官長憂民意不開底是山靈相嫵媚故驅風雨過江來楸花楸樹馨香見未曽墻西碧蓋聳孤稜會須雨洗塵埃盡看吐髙花一萬層河汾諸老詩集卷之六
