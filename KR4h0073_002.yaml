front:
  text: 河汾諸老詩集卷之二
  hash: sha256:6404f2b5b17e5b2cf5723a5269430fd5c2fb5a9e7bebf56db53a4e8839399573
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_002-1a}
body:
  text: 橫汾隱者房祺編石泉張先生宇彥升送趙冝之歸辛安兼簡洛下諸友悽惻復悽惻送君汾水側人生歡會少一別難再得昔經劫火然二烏奮驚翼嗷嗷各何之同落天西北日夕相和鳴此樂未易極狂風忽吹散一烏歸故國翶翶入寥廓萬里期一息鄧林有餘隂未肯栖枳棘玉山有嘉禾未肯求粒食一鳥獨未歸毰毸老無力矯首思舊群􅏰然淚沾臆雌雞行雌雞粥粥將鳬兒鳬兒入水雞鳴悲岸南岸北飛且隨但恐摶攫遭鳶鴟岸傍無食寧飢死朝暮不肯須臾離傍人爭笑愚且癡我哀物理為人欺雲溪秋泛圖為閻國寶賦晴嵐滴翠霜樹殷石錦錯落苔花班人家隱約荒靄外但見籬落連柴關兩山中斷忽空曠下有碧水之潺湲幽人航葦迷逺近思致蹇無容攀定非鴟夷成霸業一舸五湖煙浪寬又非坡仙逰赤壁酒酣浩歌江月寒亦當柱杖橫膝看南山心與白雲相對間胡為厭山瞰芳渚岸草汀花適幽趣有聲詩畫無聲詩夏蟲未易寒氷語或云此本張季鷹蓴鱸忽憶扁舟輕蹇豫有家歸未得一見秋風羽翼生採蓮分得底字溪風搖搖波瀰瀰十里芳華照清沚蘭舟女郎紅玉春日射新粧明水底芙蓉雙檢百媚生吳宫西施漢良娣藕腸折斷雪絲牽入手花枝香􅠩􅠩隔岸誰家貴公子調笑新詞歌艷體吳儂變風有如此誰念采蘋供祭禮哭姪學業方成二紀過虛舟一夕殞頽波死皆有命憐渠早老獨無依奈我何歸計雲山空莽蒼愁懷日月暗消磨白楊半夜風瀟瑟盡是吾兒薤露歌感懷世路羊腸劇險艱天心應厭著儒冠老無子息心易貧交親託事難文字售人真滯貸庶乎養巳間官羲經讀罷無人會庭竹瀟森夜月寒吊蕭同知蕭蘭一夕殞秋霜數載交情遽忍忘逰覽雲山春並轡笑談風雨夜連床治心我謂當誠慤處巳君言貴肅莊此理從今誰與論隰州林月渺蒼蒼上巳日逰平湖微風漠漠水增波禊事重修繼永和脆管當筵清似語扁舟爭岸疾如梭一時人物成髙會千里雲山入浩歌日暮芝蘭無處覔野花汀草占春多送田茂卿赴都宿雨𥘉晴草木齊一杯汾水恨分携上林曉色多鶯友長路春風入馬蹄黃卷可能無斗祿青雲自是有天梯從來俊傑知時務莫為寒窗故絶迷和李子微村居健羡南溪老幽居水石間心無塵事汩身與野雲間院靜深藏竹墻低易得山蒲團香一炷花落鳥􅚓􅚓又別野荒城外居間事事幽栽松添野色接銗引溪流詩社分新韻村醪洗舊愁更求名與利騎鶴望揚州送李仲暉之洛同是思鄉客君先著祖鞭驪駒歌落日去鴈入髙天莫戀河濵粟當耕谷口田親朋儻相問為報巳衰年送馬德新馬弟吾鄉秀青雲正壯年四知雖自畏六戒得師傳秦府開賢路瀛州列俊躔秋風黃鵠健老眼看髙騫贈黃甫德璋明德本生公醫名一代雄杖頭間日月舌上舊家風雅趣錢神外髙情酒聖中治人隂德在夀骨秀而豐和劉敏之韻城居寧不好未易著間人客至慙無酒詩成莫療貧談天雖有口無地可安身羡殺清江鷺生來不受塵秋日出郭離離禾􅎟滿郊墟棗實紅殷接野閭四十年來無史筆有年今日仗誰書和李濟夫韻午夢逰仙鳥唤廽竹隂掃地靜無埃莫言嘉客間中少時有清風自往來荆公作古非今􅍔巳成亦知鬼責與天刑試看一病遺言處猶勸傍人誦佛經襄陵北城溪坐楊桞隂隂水氣涼椒花蔌䔩野風香地偏愈覺似間整始信擒昌化日長間述此性生而與道俱靈源常患少人疏楊侯一語崇經學士子爭相讀四書解作時文一二篇􅎍中意氣巳掀然何如剖破醯雞甕看取人間大有天河汾諸老詩集卷之二
