front:
  text: 河汾諸老詩集卷之七
  hash: sha256:bc5f2b587e6b564800036ca1cb781a618d94e2b32eef0c706a65b320e4a41409
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_007-1a}
body:
  text: 橫汾隱者房祺編菊軒假先生成巳誠之題容安堂陳子少英邁逸氣不可挫典刑肖乃翁出語輒驚座行止非所能造物聽掀簸功名鷹在鞲歲月蟻旋磨區區一室中十載供史課結廬慕淵明志向有許大淡墨寫形似終日相對坐一室足我容百念付慵惰青山隱簷楹流水出階左植花數十叢種竹千百箇事來若機張事去如瓶墮浩然方寸間不受一塵汚豈無二仲賢間暇日相過有酒相獻酬有詩互賡和溪山入笑談珠玉霏咳唾徜徉天地間一物莫非我醉來語更真卿去我將臥主人正髙眠山鳥莫啼破題梁氏靜樂堂攘攘區中人役心名與利於身竟何有乾沒不少置叔敬有耳孫犖犖與時異一官不肯覔間居飬髙志築室塵境中中有塵外意方其厭囂啾歸來行少墍牀頭一卷書靜洗紛華纍苟能樂其樂寧復事吾事見客不吝情有酒即成醉為問東華塵何如北窗睡清風吹我懷萬事覺無味誰知方寸間自有清涼地蘇氏承顔堂登仙不羡飛雙鳬宰官不樂紓金珠行年四十著綵服悲啼效作兒聲􅈱丈夫豈無四方志倚閭望望心何如家國無事壽觴舉慈顔得酒增和舒客來草具對客食殺雞奉母其榮華富貴固所願有子能盡如君不動古未有悅親自得神明扶茁哉人生孟林笋圉言日出薑泉魚古來孝感有如此今人蓋以古為模嘗聞古有色難戒愛深容色何愈愈詩成不覺涕淚俱尓有毋遺傷獨無他年誰作孝友傳請録吾語為君書題秋暮山行圖亂山嵂崒爭清妍寒林寂歷相綿聮人間黃塵千萬丈一點不到山林邊秋光淡薄秋氣爽浮雲積翠何蔥芊髙風凄其脫木葉向來面目仍增姢江流一曲抱山麓孤舟斜日栖江湍行人何適來負擔腰膂犖確石頭路蹇驢鞭不前人家前塗渺何許望之不及憂悁悁問公何從得此本筆勢髣佛營丘傳我本山中人見之心惘然崁歷落真可笑對畫題詩思昔年送孫仲文行臺之召仲也何人斯不滿六尺長言議間英發入耳音琅琅胸懷湛秋水面目嚴清霜讀書及城且寓迹鳬鶩行自公少餘暇婉愈奉髙堂甘旨未及親有飯不敢嘗顔色或未怡綵又戲親傍執喪三年中哀慕如新喪回思顧復勞此意何時忘日聞辟書下且喜還且傷捧檄念吾親不覺涕泗滂拔英外臺選列布皆圭璋掾吏須幾人亦必求循良世人豈無才要以德自將紏擲誰弗能吾心恐無常詩人有明誡茹柔吐其剛孝為百行先子孝吾既詳苟能推此心前路未易量殷勤飬雲翼行矣勿匆忙醒心亭窗前流水玉冷冷窗下髙人酒半醒喚省邯鄲枕中夢如看王湛案頭經翛然自得天逰趣恍若那知地境靈説似功名場上客倦遊時節一來聽送尋正道江邊楊柳才堪折陌上行人還又別春光不解苦留人兩岸楊花飛白雪江風搖搖吹緑波欲別未別傷如何願君少住聽我歌後日重來白髮多跋三堂王自寫真解去盤礴真畫史不特濡毛知可矣葛仙草服常畫我意𣣔置我山嵓裏虎頭于今幾百年與渠誰後復誰先翛然蛻迹乘風去一笑相逢喜拍肩跋秦得真墨晴窗不用辨犀紋墨妙秦郎巳飫聞翠餅瑩如雅背淨玉圖香鄙麝臍薰永寧賜弟今猶少易水無良古亦云老我愧非揮翰手兩丸投贈負伊勤送馮資深西歸人間蠻觸日干戈暮四朝三能幾何歸去不憂瓶粟罄西山雨足蕨薇多蕭蕭華髮老書生久欲歸田計未成喜聽日邊消息好故山容得子真耕三年思慮謾營營重見浮山眼倍青􅎍次無塵元自好床頭况有洗心經侯門稚子喜歸來暖熱都無酒一杯抖擻滿身塵土盡襟懷還對好山間嗅梅玉骨那愁瘴霧傷好將經卷伴南荒坡仙鼻孔清如水老覺朝雲道氣長題張郎中明皇小決圖志在驅馳禍巳胎笑顔况更為誰開貧爭飛鞠鞭􅐒去不覺踰有􅎷來天寶承平事久無弄丸驢背恣驅馳不期一笑宫中戲傳作人間小決圖如夢庵覺時還笑夢時訛夢覺其間有幾何聊爾藏身大槐國臥看明月上南柯虞坂曉行林外晨雞苐一聲隴頭殘月伴人行未知局促鹽車下老驥蕭蕭又幾鳴首陽晴雪薇歌一曲對青山萬古千秋老翠巒望斷空嵓人不見光搖銀海玉峯寒書師嵓卿蒲中八詠圖老大溪山入夢頻聊慿圖畫寫情真歸歟不及身強健山有英靈恐笑人河汾諸老詩集卷之七
