front:
  text: 河汾諸老詩集卷之五
  hash: sha256:391699676e8b4b9d8db45145f2a055204cdc267905494aab8d73923156ee7fe2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0073_SBCK_005-1a}
body:
  text: 橫汾隱者房祺編白雲子房先生皡希白江上行浮雲淡淡心悠悠杖藜來作江邊逰啇人打鼓催行舟洪波不斷東南流木葉瀟瀟荆楚秋勸君休上王粲樓日落滄江增暮愁賣劔行贈韋漢臣滄海波未澄無人斬長鯨韋郎三尺玉匣中鳴不平蛟龍一出雷雨隨翕匆變化清四夷可惜有才不見用青天白日將何為酒酣起舞抱劒哭肅肅悲風動茅屋不如南山學種田自古青萍换黃犢扣角歌贈史吉甫剝剝剝扣牛角自從破却黃雞殼隂陽二氣分清濁巽則為風震則雷流者成川峙者嶽易道常行日用間醉夢昏昏人不覺伏羲不得巳而畫文王不得巳而重叔世不及上世隆夫子不言人益蒙著成大傳開肓聾譬如曰出滄海東無物不在光明中峨嵋山人史居士來到公安大智寺手携牛角𣣔何為發明三聖心中事人言康節是前身但不家居洛之涘􅎍中一部皇極書造化功夫際天地舒之則彌滿六合卷之則不盈一握近之則在乎目前逺之則入乎冥邈有人來問先天學扣牛角剝剝剝貧家女貧家女德性溫柔寡言語終年辛苦不下機身上却無絲一縷倡家女兒百不㑹只向人前賣嬌態繡䄄端坐青樓中銀燭熒煌照珠翠書言福善與􅍔淫未必天公有此心盜跖長年顔子夭古來顛倒非獨今髙處是崑崙低處是東溟崑崙推不倒東海填不平物之不齊物之情貧女莫羡倡女榮不義富貴浮雲䡖持身但如氷雪清德耀荆叉有令名送王升卿傷哉船子峰頭月昨夜團團今夜缺月華猶自不長圓人生安得無離別世上憂端千萬許惟有別離心最苦盧川春晚送君行落花為我啼紅雨四海紛紛尚戎馬我曹只合歸林下如椽大筆今無用日課新詩自陶寫嵩陽佳處如罨畫浮可漁兮田可稼我𣣔從君覔隱居却恐山靈嫌俗駕題吕仙亭嶽陽城南吕公洞道人見客無迎送事少方知日月長身間未覺功名重竹影松隂生午凉山色湖光設朝供髙吟下視世間人幾人不在黃梁夢寄呈嶽陽諸友禀性太𥚹率不受塵事觸自小逺市門里劈居在嵓谷人間嗜好心舍書百不欲一飽更奚求簞瓢隨分足失腳墮世路纏紏若微纒人以官為榮我以官為辱平生喜髙潔為宫近卑俗平生喜曠逹為官窘邊幅平生喜踈散為官貴圓熟平生喜忠鯁為官多諂曲澆漓當此時古道那可復鷦鷯巢一木偃鼠飲滿腹誰能朱門中區區丐梁肉折腰趍下風不厭解印速青山喚我歸早晚謝羈束一尊石上酒浩歌對松菊題張信之見山堂自古朝市人罕與山相㑹山豈欲逺人人自與山背張侯創新居正在闤闠內何以得青山坐上日相對胸中有丘􅊤眼前無障礙人物既蕭散山不問內外晚來天氣佳收目入清快乾坤無一塵草木有多態千里好風來幾縷殘霞在柱笏當此時未覺功名人慶王鼎玉生子魏侯照乘珠卞氏連城玉此物豈易得君家貯滿屋平生積德深天錫以多福熊羆入夢頻不待封人祝長者巳雄偉幼者更清淑指日看騫騰誰為犀角秃願君剩買書學語便教讀斯文久不振六經要再續人生宇宙間百歲一瞬速美惡暫時休何者為榮辱且引昔寧馨逸院種松菊陶潜歸去來有子萬事足戊子萬事人間巳飽諳一身猶自客天南行非楊秉三無惑性似稽康七不堪俗學為名多外飾聖人飬德貴中函有時靜坐深思省三十年前總是慙寄假誠之咫尺春風三十三不如歸卧舊煙嵐浮雲冨貴吾何慕陋巷簞瓢分所甘多語數窮深可戒虛名無用不冝貪寥寥孔學今千載賴有斯人可共談次前韻寄王升卿谷口人家十二三家家窗戶得晴嵐千章雲木秀而野一脉泉流清且甘徇俗到頭終是病耽書自古不名貪作詩為問東溪友樽酒何時愜笑談辛卯生朝呈郭周卿假復之瓮面醯雞積有年近來霧豁見全天出言最忌談人惡入德尤冝去自賢回也屢空趍聖域參乎一唯得心傳佛岐老徑雖髙絶不及中庸道坦然贈趙山甫冦盜連年劇蝟毛一身無處可奔逃陳平自合西歸漢葛亮焉能北事曹嗟我命兼才共薄印君名與德俱髙幾時一笑滄浪畔右手持杯左手螯器楊叔能仰看飛鴻俯看鱗訃來不覺淚沾巾風塵末路尤多難山澤癯儒只合貧亂後有誰收恨骨眼前無復見斯人襄陽舊隱依然在花落空庭冷淡春送李正甫九日韻論著哀時總可哀不如且放笑顔開留連風月慿詩句管領江山有酒杯我𣣔處身如此處君言裁恨若為裁從今但有錢三百相約高樓盡醉回憶新墻劉德淵雲煙杳靄水微茫何處青山是嶽陽白髮滿頭空自老黃塵兩腳為誰忙同盟鄂渚言猶在偕隱廬峰興未忘近有倦遊詩數首西風吹不到新墻思隱得箇黃牛學種田蓋間茅屋傍林泉情知老去無多日且向間中過幾年詘道詘身俱是辱愛詩愛酒總名仙世間百物還須買不信山也寄王文炳愛客孔文舉能詩陸士衡十年求識面千里飽聞名郁郁芝蘭秀蕭蕭風露清幾時樽酒畔容我話平生和楊叔能之字韻遭亂重相見寬心不用悲江山佳麗地人物太平時白蟻千家酒黃花九日詩鹿門不可隱吾道𣣔安之丙申元日三十八年過星星白髮多干戈猶浩蕩蹤跡轉蹉跎世事堪長嘆吾生付短歌江湖從此逝煙雨一漁簑辛丑巴東元日舊日逢春喜而今怕見春紅塵長路客殘病老夫身政拙難書考家貧只纍人自憐頭上髮更比去年新秋夜百計未安未得安此心須在鬢凋殘漫漫長夜渾無睡蟋蟀堂深秋雨寒自遣幾見秋風幾見春一愁未巳一愁新間中點撿平生事唯有清貧不負人瓮面浮香處處春任他特事百端新自知野􅎷山麋相不是麒麟閣上人别西湖聞說西湖可樂飢十年勞我夢中思湖邊𣣔買三間屋問遍人家不要詩題張濟之勝覽軒誰言山色可忘憂誰道澄江銷客愁試倚欄杆西北望浮雲依舊暗神州讀杜詩後學為詩務聞竒詩家竒病最難醫欲知子美髙人處只把尋常話做詩穹礴冥搜枉費功天然一語自然工况兼詩是窮人物好句多生感慨中千里奔馳蜀道難草堂賔主罄交歡怒冠三挂簾鈎上誰謂將軍禮數寬春日觀萊手種蕪菁欲療飢春來頗怪發生遲東風貪長新桃李未有功夫到菜畦河汾諸老詩集卷之五
